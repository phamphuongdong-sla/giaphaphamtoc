<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Gia Phả Phạm Tộc</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&family=Noto+Serif:wght@600;700;800;900&display=swap" rel="stylesheet">
  <style>
    :root {
      --lacquer: #733a35;
      --lacquer-dark: #3b1b19;
      --lacquer-soft: #9a5b50;
      --bronze: #9c7442;
      --bronze-soft: #d5b987;
      --paper: #f6efe3;
      --paper-light: #fffaf2;
      --ink: #29241f;
      --muted: #756b61;
      --line: #b89a68;
    }
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body, #root { width: 100%; height: 100%; margin: 0; }
    body {
      font-family: "Be Vietnam Pro", system-ui, sans-serif;
      background:
        linear-gradient(135deg, rgba(255, 251, 243, .86), rgba(246, 239, 227, .9)),
        repeating-linear-gradient(45deg, rgba(156, 116, 66, .045) 0 1px, transparent 1px 18px),
        linear-gradient(135deg, #fbf4e8 0%, #f4ead9 52%, #efe1ce 100%);
      color: var(--ink);
      overflow: hidden;
    }
    .font-serif { font-family: "Noto Serif", serif; }
    .shell {
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background-image:
        linear-gradient(rgba(115, 58, 53, .025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(115, 58, 53, .02) 1px, transparent 1px);
      background-size: 34px 34px;
    }
    .topbar {
      position: relative;
      z-index: 80;
      min-height: 92px;
      padding: 14px clamp(14px, 3vw, 34px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 18px;
      color: #fff6e8;
      background:
        linear-gradient(120deg, rgba(59, 27, 25, .98), rgba(115, 58, 53, .96) 56%, rgba(82, 42, 38, .98)),
        repeating-linear-gradient(90deg, transparent 0 28px, rgba(255, 246, 232, .026) 28px 29px);
      box-shadow: 0 14px 34px rgba(59, 27, 25, .18);
      border-bottom: 1px solid rgba(213, 185, 135, .34);
    }
    .crest {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      flex: 0 0 auto;
      background: linear-gradient(145deg, #f0d9a5 0%, #a77c45 58%, #734728 100%);
      color: #fff8ed;
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, .2), 0 10px 22px rgba(59, 27, 25, .17);
    }
    .segmented {
      display: flex;
      gap: 4px;
      padding: 5px;
      border-radius: 999px;
      background: rgba(255, 246, 232, .11);
      border: 1px solid rgba(255, 246, 232, .18);
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .06);
    }
    .segmented button {
      height: 38px;
      padding: 0 16px;
      border-radius: 999px;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .04em;
      text-transform: uppercase;
      color: rgba(255, 246, 232, .68);
      transition: .18s ease;
    }
    .segmented button.active {
      color: #3d1716;
      background: linear-gradient(180deg, #efdaa8, #c9a063);
      box-shadow: 0 8px 16px rgba(45, 20, 16, .14);
    }
    .notice {
      position: relative;
      z-index: 50;
      display: flex;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      padding: 8px clamp(12px, 3vw, 28px);
      background: linear-gradient(90deg, #e4c98f, #fbefd2 48%, #dfbd7d);
      color: #4a3320;
      border-bottom: 1px solid rgba(102, 70, 37, .18);
      box-shadow: 0 8px 20px rgba(102, 70, 37, .08);
    }
    .notice-label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      height: 28px;
      padding: 0 12px;
      border-radius: 999px;
      background: #733a35;
      color: #fff6e8;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
      box-shadow: 0 6px 12px rgba(61, 23, 22, .18);
    }
    main { position: relative; flex: 1; min-height: 0; overflow: hidden; }
    .list-scroll {
      position: absolute;
      inset: 0;
      overflow-y: auto;
      padding: 18px 14px 96px;
      -webkit-overflow-scrolling: touch;
    }
    .list-inner { width: min(820px, 100%); margin: 0 auto; }
    .toolbar {
      position: sticky;
      top: 0;
      z-index: 20;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      padding: 10px 0 14px;
      backdrop-filter: blur(10px);
    }
    .action-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      min-height: 40px;
      padding: 0 14px;
      border-radius: 12px;
      border: 1px solid rgba(115, 58, 53, .14);
      background: rgba(255, 251, 243, .92);
      color: #733a35;
      font-size: 11px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 0 8px 18px rgba(61, 23, 22, .06);
    }
    .search-panel {
      margin: 0 0 14px;
      padding: 12px;
      border-radius: 18px;
      background: rgba(255, 251, 243, .78);
      border: 1px solid rgba(115, 58, 53, .1);
      box-shadow: 0 10px 24px rgba(59, 27, 25, .045);
      backdrop-filter: blur(10px);
    }
    .search-box {
      position: relative;
      display: flex;
      align-items: center;
    }
    .search-box i {
      position: absolute;
      left: 13px;
      color: rgba(115, 58, 53, .58);
      pointer-events: none;
    }
    .search-input {
      width: 100%;
      min-height: 44px;
      padding: 0 44px;
      border-radius: 14px;
      border: 1px solid rgba(115, 58, 53, .14);
      background: rgba(255, 253, 248, .96);
      color: var(--ink);
      font-size: 13px;
      font-weight: 700;
      outline: none;
      box-shadow: inset 0 1px 0 rgba(255, 255, 255, .74);
    }
    .search-input:focus {
      border-color: rgba(156, 116, 66, .45);
      box-shadow: 0 0 0 3px rgba(213, 185, 135, .18);
    }
    .clear-search {
      position: absolute;
      right: 6px;
      width: 32px;
      height: 32px;
      display: grid;
      place-items: center;
      border-radius: 10px;
      color: #733a35;
    }
    .search-summary {
      margin: 10px 2px 0;
      color: rgba(41, 36, 31, .58);
      font-size: 11px;
      font-weight: 800;
    }
    .search-results {
      margin-top: 10px;
      display: grid;
      gap: 8px;
    }
    .search-result {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 12px;
      border-radius: 14px;
      background: #fffdf8;
      border: 1px solid rgba(115, 58, 53, .08);
      text-align: left;
      box-shadow: 0 6px 14px rgba(59, 27, 25, .035);
    }
    .search-result-name {
      color: #4a2522;
      font-size: 13px;
      font-weight: 900;
      line-height: 1.35;
    }
    .search-result-path {
      display: block;
      margin-top: 4px;
      color: rgba(41, 36, 31, .55);
      font-size: 10px;
      font-weight: 700;
      line-height: 1.4;
    }
    .search-empty {
      margin-top: 10px;
      padding: 14px;
      border-radius: 14px;
      color: rgba(41, 36, 31, .62);
      background: rgba(115, 58, 53, .035);
      font-size: 12px;
      font-weight: 700;
      text-align: center;
    }
    .family-card {
      position: relative;
      min-height: 118px;
      margin-bottom: 10px;
      border-radius: 16px;
      overflow: hidden;
      cursor: pointer;
      background:
        linear-gradient(180deg, rgba(255,251,243,.98), rgba(250,244,234,.97));
      border: 1px solid rgba(115, 58, 53, .095);
      box-shadow: 0 10px 24px rgba(59, 27, 25, .05);
      transition: transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }
    .family-card:active { transform: scale(.99); }
    .family-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      background: linear-gradient(90deg, rgba(115,58,53,.18), rgba(156,116,66,.32), rgba(115,58,53,.08));
      opacity: .78;
    }
    .family-card:hover { border-color: rgba(156, 116, 66, .25); box-shadow: 0 16px 32px rgba(59, 27, 25, .07); }
    .family-card.dark {
      color: #fff6e8;
      background:
        linear-gradient(135deg, rgba(59, 27, 25, .98), rgba(115, 58, 53, .94));
      border-color: rgba(213, 185, 135, .28);
    }
    .family-card.branch {
      background:
        linear-gradient(180deg, rgba(255, 250, 242, .99), rgba(247, 238, 224, .98));
      border-color: rgba(156, 116, 66, .24);
    }
    .family-card.branch::before {
      height: 4px;
      background: linear-gradient(90deg, #733a35, #c5a06a 48%, rgba(115, 58, 53, .18));
    }
    .family-card.birthday {
      border-color: #b58b4d;
      box-shadow: 0 0 0 1px rgba(181, 139, 77, .18), 0 16px 34px rgba(156, 116, 66, .11);
    }
    .card-body {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 14px;
      padding: 18px 18px 16px 22px;
    }
    .deceased-mark {
      position: absolute;
      inset: 0 auto auto 0;
      width: 58px;
      height: 58px;
      overflow: hidden;
      z-index: 3;
      pointer-events: none;
    }
    .deceased-mark::before {
      content: "";
      position: absolute;
      top: 11px;
      left: -24px;
      width: 78px;
      height: 18px;
      transform: rotate(-45deg);
      background: #24201d;
      box-shadow: 0 2px 5px rgba(0,0,0,.26);
    }
    .birthday-ribbon {
      position: absolute;
      top: 0;
      right: 0;
      z-index: 4;
      display: inline-flex;
      align-items: center;
      gap: 4px;
      height: 22px;
      padding: 0 11px;
      border-bottom-left-radius: 13px;
      background: linear-gradient(135deg, #8d4a40, #b58b4d);
      color: #fffaf1;
      font-size: 8px;
      font-weight: 900;
      text-transform: uppercase;
      pointer-events: none;
    }
    .title-pill {
      display: inline-flex;
      align-items: center;
      width: fit-content;
      height: 22px;
      padding: 0 9px;
      border-radius: 999px;
      background: linear-gradient(180deg, #ead6a5, #ac824a);
      color: #3d2515;
      font-size: 9px;
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35);
    }
    .name {
      margin-top: 7px;
      font-size: clamp(17px, 2vw, 23px);
      line-height: 1.22;
      font-weight: 900;
      color: #733a35;
    }
    .dark .name { color: #efdcae; }
    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
      font-size: 11px;
      color: #776d63;
    }
    .dark .meta { color: rgba(255,246,232,.74); }
    .meta-item {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      min-height: 28px;
      padding: 5px 9px;
      border-radius: 10px;
      background: rgba(115, 58, 53, .038);
      border: 1px solid rgba(115, 58, 53, .06);
    }
    .dark .meta-item {
      background: rgba(255,255,255,.1);
      border-color: rgba(255,255,255,.12);
    }
    .death { color: #8d4a40; font-weight: 800; }
    .dark .death { color: #efdcae; }
    .info {
      margin-top: 10px;
      width: fit-content;
      max-width: 100%;
      padding: 8px 10px;
      border-radius: 12px;
      background: rgba(59, 27, 25, .04);
      color: #655a50;
      font-size: 11px;
      line-height: 1.45;
      font-style: italic;
    }
    .dark .info { background: rgba(255,255,255,.09); color: rgba(255,246,232,.86); }
    .branch-list {
      margin: 0 0 8px 16px;
      padding-left: 14px;
      border-left: 1.5px solid rgba(156, 116, 66, .28);
    }
    .branch-list .branch-list .branch-list .branch-list {
      margin-left: 6px;
      padding-left: 10px;
      border-left-style: dashed;
    }
    .tree-stage {
      position: absolute;
      inset: 0;
      overflow: hidden;
      cursor: grab;
      touch-action: none;
      background-image:
        linear-gradient(rgba(115, 58, 53, .035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(115, 58, 53, .027) 1px, transparent 1px),
        linear-gradient(180deg, rgba(255,251,243,.62), rgba(246,239,227,.22));
      background-size: 34px 34px, 34px 34px, 100% 100%;
    }
    .tree-stage:active { cursor: grabbing; }
    .tree-canvas {
      position: absolute;
      inset: 0;
      display: flex;
      justify-content: center;
      padding-top: 38px;
      transform-origin: top center;
      transition: transform .06s linear;
    }
    .tree-branch {
      position: relative;
      display: flex;
      padding-top: 44px;
    }
    .tree-item {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 44px 18px 0;
    }
    .tree-item::before {
      content: "";
      position: absolute;
      top: 0;
      left: 50%;
      width: 2px;
      height: 44px;
      transform: translateX(-50%);
      background: var(--line);
    }
    .tree-item::after {
      content: "";
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 2px;
      background: var(--line);
    }
    .tree-item:first-child::after, .tree-item:last-child::after, .tree-item:only-child::after { display: none; }
    .tree-item:first-child::before {
      left: 50%;
      width: 50%;
      transform: none;
      border-top: 2px solid var(--line);
      border-left: 2px solid var(--line);
      border-top-left-radius: 16px;
      background: transparent;
    }
    .tree-item:last-child::before {
      left: 0;
      width: 50%;
      transform: none;
      border-top: 2px solid var(--line);
      border-right: 2px solid var(--line);
      border-top-right-radius: 16px;
      background: transparent;
    }
    .tree-item:only-child::before {
      left: 50%;
      width: 2px;
      transform: translateX(-50%);
      border: 0;
      border-radius: 0;
      background: var(--line);
    }
    .root-node { padding-top: 0; }
    .root-node::before, .root-node::after { display: none; }
    .tree-card {
      position: relative;
      width: 304px;
      min-height: 212px;
      border-radius: 16px;
      overflow: visible;
      border: 1px solid rgba(115, 58, 53, .12);
      background: rgba(255, 251, 243, .96);
      box-shadow: 0 16px 32px rgba(59, 27, 25, .07);
      cursor: pointer;
    }
    .tree-card::before {
      content: "";
      position: absolute;
      inset: 0 0 auto;
      height: 3px;
      border-radius: 16px 16px 0 0;
      background: linear-gradient(90deg, rgba(115,58,53,.18), rgba(156,116,66,.32), rgba(115,58,53,.08));
      z-index: 3;
      pointer-events: none;
    }
    .tree-card.dark {
      color: #fff6e8;
      background: linear-gradient(135deg, #3b1b19, #733a35);
      border-color: rgba(213, 185, 135, .3);
    }
    .tree-card.branch {
      background: linear-gradient(180deg, rgba(255, 250, 242, .99), rgba(247, 238, 224, .98));
      border-color: rgba(156, 116, 66, .24);
    }
    .tree-card.branch::before {
      height: 4px;
      background: linear-gradient(90deg, #733a35, #c5a06a 48%, rgba(115, 58, 53, .18));
    }
    .tree-card.spouse {
      background: linear-gradient(135deg, #fffaf2, #f8eddd);
      border-color: rgba(156, 116, 66, .2);
    }
    .tree-card-content {
      position: relative;
      z-index: 2;
      height: 100%;
      padding: 20px;
      overflow: hidden;
      border-radius: 16px;
    }
    .tree-card .name { text-align: center; font-size: 19px; }
    .tree-card.dark .name { color: #efdcae; }
    .parent-line {
      position: absolute;
      left: 50%;
      bottom: -44px;
      width: 2px;
      height: 44px;
      transform: translateX(-50%);
      background: var(--line);
      z-index: 1;
    }
    .parent-line::after {
      content: "";
      position: absolute;
      bottom: 0;
      left: 50%;
      width: 9px;
      height: 9px;
      border-radius: 50%;
      transform: translate(-50%, 50%);
      background: #9d7745;
      box-shadow: 0 0 0 4px rgba(156, 116, 66, .14);
    }
    .tree-controls {
      position: absolute;
      right: 18px;
      bottom: 18px;
      z-index: 30;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .icon-button {
      width: 46px;
      height: 46px;
      display: grid;
      place-items: center;
      border-radius: 14px;
      background: rgba(255, 251, 243, .92);
      color: #733a35;
      border: 1px solid rgba(115, 58, 53, .11);
      box-shadow: 0 10px 22px rgba(59, 27, 25, .09);
      backdrop-filter: blur(8px);
    }
    .icon-button.primary {
      background: linear-gradient(180deg, #8b4b42, #733a35);
      color: #fff6e8;
      border-color: rgba(213, 185, 135, .26);
    }
    .modal-backdrop {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 18px;
      background: rgba(37, 25, 20, .58);
      backdrop-filter: blur(10px);
    }
    .modal {
      width: min(440px, 100%);
      max-height: min(680px, 88vh);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-radius: 24px;
      background: #fffaf2;
      border: 1px solid rgba(213, 185, 135, .38);
      box-shadow: 0 26px 64px rgba(37, 25, 20, .32);
      animation: pop .24s ease-out both;
    }
    @keyframes pop { from { opacity: 0; transform: translateY(18px) scale(.98); } to { opacity: 1; transform: none; } }
    .modal-head {
      padding: 26px;
      text-align: center;
      color: #fff6e8;
      background: linear-gradient(135deg, #3b1b19, #733a35);
    }
    .modal-list {
      padding: 16px;
      overflow-y: auto;
      display: grid;
      gap: 10px;
    }
    .reminder-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 12px;
      align-items: center;
      padding: 14px;
      border-radius: 16px;
      background: #fffdf8;
      border: 1px solid rgba(115, 58, 53, .09);
    }
    .days-pill {
      padding: 7px 9px;
      border-radius: 999px;
      background: #f0dfbb;
      color: #5a3a20;
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      white-space: nowrap;
    }
    .days-pill.today { background: #733a35; color: #fff6e8; }
    .modal-icon { color: #e4ca91; }
    .modal-date { color: #8d4a40; }
    .modal-close {
      background: linear-gradient(180deg, #8b4b42, #733a35) !important;
      color: #fff6e8 !important;
      border-color: rgba(213, 185, 135, .26) !important;
    }
    .detail-modal {
      width: min(560px, 100%);
    }
    .detail-head {
      padding: 24px;
      color: #fff6e8;
      background:
        linear-gradient(135deg, rgba(59, 27, 25, .98), rgba(115, 58, 53, .94)),
        repeating-linear-gradient(90deg, transparent 0 24px, rgba(255, 246, 232, .025) 24px 25px);
    }
    .detail-close {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 36px;
      height: 36px;
      display: grid;
      place-items: center;
      border-radius: 12px;
      color: rgba(255, 246, 232, .86);
      background: rgba(255, 255, 255, .1);
      border: 1px solid rgba(255, 255, 255, .12);
    }
    .detail-body {
      padding: 16px;
      overflow-y: auto;
      display: grid;
      gap: 12px;
    }
    .detail-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 10px;
    }
    .detail-field {
      min-height: 70px;
      padding: 13px;
      border-radius: 14px;
      background: #fffdf8;
      border: 1px solid rgba(115, 58, 53, .08);
    }
    .detail-label {
      display: flex;
      align-items: center;
      gap: 7px;
      color: rgba(115, 58, 53, .68);
      font-size: 10px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .detail-value {
      margin-top: 7px;
      color: #29241f;
      font-size: 13px;
      font-weight: 800;
      line-height: 1.45;
    }
    .detail-subtitle {
      margin-top: 8px;
      color: rgba(255, 246, 232, .74);
      font-size: 12px;
      font-weight: 800;
      line-height: 1.45;
    }
    .detail-tags {
      margin-top: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
    }
    .detail-tag {

              <div className="detail-grid">
                <div className="detail-field">
                  <p className="detail-label"><Icon name="signature" size={13} /> Họ tên</p>
                  <p className="detail-value">{displayName}</p>
                </div>
                <div className="detail-field">
                  <p className="detail-label"><Icon name="layers" size={13} /> Đời / vai vế</p>
                  <p className="detail-value">Đời thứ {gen}{titleLabel ? ` - ${titleLabel}` : ""}</p>
                </div>
                <div className="detail-field">
                  <p className="detail-label"><Icon name="sun" size={13} /> Ngày sinh</p>
                  <p className="detail-value">{formatBirth(data) || "Chưa có dữ liệu"}</p>
                </div>
                {data.deceased && (
                  <div className="detail-field">
                    <p className="detail-label"><Icon name="moon" size={13} /> Ngày Mất</p>
                    <p className="detail-value">{formatDeath(data) || "Chưa có dữ liệu"}</p>
                  </div>
                )}
                <div className="detail-field">
                  <p className="detail-label"><Icon name="badge-check" size={13} /> Trạng thái</p>
                  <p className="detail-value">{status}</p>
                </div>
                <div className="detail-field">
                  <p className="detail-label"><Icon name="user-round" size={13} /> Giới tính</p>
                  <p className="detail-value">{getGenderLabel(data.gender)}</p>
                </div>
                <div className="detail-field">
                  <p className="detail-label"><Icon name="git-branch" size={13} /> Chi nhánh</p>
                  <p className="detail-value">{branchLabel}</p>
                </div>
              </div>
              <div className="lineage-box">
                <p className="detail-label"><Icon name="route" size={13} /> Tuyến quan hệ</p>
                <p className="lineage-path">
                  {pathNodes.map((node, idx) => {
                    const nodeName = cleanName(node.name);
                    // Nếu là phần tử đầu tiên, không in dấu gì phía trước
                    if (idx === 0) {
                      return <span className="lineage-step" key={`${nodeName}-${idx}`}>{nodeName}</span>;
                    }

                    // Nếu node hiện tại là vợ/chồng thì in trái tim trước nó, ngược lại in dấu "/"
                    if (node.isSpouse) {
                      return (
                        <React.Fragment key={`${nodeName}-${idx}`}>
                          <span className="lineage-heart">❤️</span>
                          <span className="lineage-step">{nodeName}</span>
                        </React.Fragment>
                      );
                    } else {
                      return (
                        <React.Fragment key={`${nodeName}-${idx}`}>
                          <span className="lineage-separator">➡️</span>
                          <span className="lineage-step">{nodeName}</span>
                        </React.Fragment>
                      );
                    }
                  })}
                </p>
              </div>
              {data.info && (
                <div className="lineage-box">
                  <p className="detail-label"><Icon name="notebook-text" size={13} /> Ghi chú</p>
                  <p className="lineage-path">{data.info}</p>
                </div>
              )}
              {data.dateWarnings?.length > 0 && (
                <div className="lineage-box">
                  <p className="detail-label"><Icon name="triangle-alert" size={13} /> Đối chiếu ngày tháng</p>
                  {data.dateWarnings.map((warning, idx) => <p className="lineage-path" key={idx}>{warning}</p>)}
                </div>
              )}
              <div className="lineage-box">
                <p className="detail-label"><Icon name="users" size={13} /> Nhánh kế tiếp</p>
                {children.length ? (
                  <div className="child-list">
                    {children.map((child, idx) => <span className="child-chip" key={`${child.name}-${idx}`}>{formatPersonName(child)}</span>)}
                  </div>
                ) : (
                  <p className="lineage-path">Chưa có dữ liệu nhánh kế tiếp.</p>
                )}
              </div>
            </div>
            <div className="p-4">
              <button className="action-button w-full modal-close" onClick={onClose}>Đóng</button>
            </div>
          </section>
        </div>
      );
    };
    const SearchPanel = ({ query, onQueryChange, results, total, onSelect }) => (
      <section className="search-panel">
        <div className="search-box">
          <Icon name="search" size={17} />
          <input
            className="search-input"
            value={query}
            onChange={(e) => onQueryChange(e.target.value)}
            placeholder="Tìm tên, ngày sinh, ngày giỗ, chi nhánh..."
          />
          {query && (
            <button className="clear-search" onClick={() => onQueryChange("")} aria-label="Xóa tìm kiếm">
              <Icon name="x" size={16} />
            </button>
          )}
        </div>
        {query.trim() && (
          <>
            <p className="search-summary">Tìm thấy {results.length} / {total} thành viên</p>
            {results.length ? (
              <div className="search-results">
                {results.slice(0, 12).map((item) => (
                  <button className="search-result" key={item.id} onClick={() => onSelect(item)}>
                    <span className="min-w-0">
                      <span className="search-result-name">{item.data.name}</span>
                      <span className="search-result-path">{item.pathNames.join(" / ")}</span>
                    </span>
                    <Icon name="panel-right-open" size={17} />
                  </button>
                ))}
              </div>
            ) : (
              <div className="search-empty">Không tìm thấy thành viên phù hợp.</div>
            )}
          </>
        )}
      </section>
    );
    const MemberItem = ({ data, level = 0, forceOpen, onSelect, parentNode = null, grandparentNode = null, gen = 1, branchName = "", pathNodes = [] }) => {
      const [open, setOpen] = useState(level < 1);
      const hasChildren = data.children?.length > 0;
      const bDate = data.birthSolar;
      const isBirthday = !data.deceased && bDate?.d && bDate?.m && bDate.m === CURRENT_SOLAR_MONTH && bDate.d >= CURRENT_SOLAR_DAY;
      const dark = level === 0;
      const branch = !!data.branchRoot;
      const currentGen = parentNode === null ? 1 : (isSpouse(data.name) ? gen : gen + 1);
      const currentBranch = data.branchLine || data.branch || branchName || "";
      const currentPath = [...pathNodes, data];
      const person = {
        data,
        parentNode,
        grandparentNode,
        gen: currentGen,
        branchName: currentBranch,
        pathNodes: currentPath,
        fullName: describeNode(data, parentNode, grandparentNode, currentGen)
      };
      useEffect(() => { if (forceOpen !== null) setOpen(forceOpen); }, [forceOpen]);
      return (
        <div>
          <article className={`family-card ${dark ? "dark" : ""} ${branch ? "branch" : ""} ${isBirthday ? "birthday" : ""}`} onClick={() => onSelect(person)}>
            {data.deceased && <div className="deceased-mark" />}
            {isBirthday && <div className="birthday-ribbon"><Icon name="cake" size={10} /> Sinh nhật</div>}
            <div className="card-body" style={{ paddingLeft: data.deceased ? 54 : undefined }}>
              <div>
                {(data.role || data.branchRoot) && <span className="title-pill">{data.role || data.branchRoot}</span>}
                <h3 className="font-serif name">{data.name}</h3>
                <Meta data={data} dark={dark} />
              </div>
              {hasChildren && (
                <button className="icon-button" aria-label={open ? "Thu gọn" : "Mở rộng"} onClick={(e) => { e.stopPropagation(); setOpen(!open); }}>
                  <Icon name={open ? "chevron-up" : "chevron-down"} size={18} />
                </button>
              )}
            </div>
          </article>
          {hasChildren && open && (
            <div className="branch-list">
              {data.children.map((child, i) => (
                <MemberItem
                  key={`${child.name}-${i}`}
                  data={child}
                  level={level + 1}
                  forceOpen={forceOpen}
                  onSelect={onSelect}
                  parentNode={data}
                  grandparentNode={parentNode}
                  gen={currentGen}
                  branchName={currentBranch}
                  pathNodes={currentPath}
                />
              ))}
            </div>
          )}
        </div>
      );
    };
    const TreeNode = ({ data, level = 0, onSelect, parentNode = null, grandparentNode = null, gen = 1, branchName = "", pathNodes = [] }) => {
      const [open, setOpen] = useState(level < 1);
      const hasChildren = data.children?.length > 0;
      const bDate = data.birthSolar;
      const isBirthday = !data.deceased && bDate?.d && bDate?.m && bDate.m === CURRENT_SOLAR_MONTH && bDate.d >= CURRENT_SOLAR_DAY;
      const dark = level === 0;
      const branch = !!data.branchRoot;
      const currentGen = parentNode === null ? 1 : (isSpouse(data.name) ? gen : gen + 1);
      const currentBranch = data.branchLine || data.branch || branchName || "";
      const currentPath = [...pathNodes, data];
      const person = {
        data,
        parentNode,
        grandparentNode,
        gen: currentGen,
        branchName: currentBranch,
        pathNodes: currentPath,
        fullName: describeNode(data, parentNode, grandparentNode, currentGen)
      };
      return (
        <div className={`tree-item ${level === 0 ? "root-node" : ""}`}>
          <article className={`tree-card ${dark ? "dark" : ""} ${branch ? "branch" : ""} ${isSpouse(data.name) ? "spouse" : ""} ${isBirthday ? "birthday" : ""}`} onClick={() => onSelect(person)}>
            {data.deceased && <div className="deceased-mark" />}
            {isBirthday && <div className="birthday-ribbon"><Icon name="cake" size={10} /> Sinh nhật</div>}
            <div className="tree-card-content">
              {(data.role || data.branchRoot) && <div className="flex justify-center"><span className="title-pill">{data.role || data.branchRoot}</span></div>}
              <h3 className="font-serif name">{data.name}</h3>
              <Meta data={data} dark={dark} />
              {hasChildren && (
                <button className="mx-auto mt-3 flex h-8 w-8 items-center justify-center rounded-xl opacity-70" onClick={(e) => { e.stopPropagation(); setOpen(!open); }} aria-label={open ? "Thu gọn" : "Mở rộng"}>
                  <Icon name={open ? "chevron-up" : "chevron-down"} size={16} />
                </button>
              )}
            </div>
            {hasChildren && open && <div className="parent-line" />}
          </article>
          {hasChildren && open && (
            <div className="tree-branch">
              {data.children.map((child, i) => (
                <TreeNode
                  key={`${child.name}-${i}`}
                  data={child}
                  level={level + 1}
                  onSelect={onSelect}
                  parentNode={data}
                  grandparentNode={parentNode}
                  gen={currentGen}
                  branchName={currentBranch}
                  pathNodes={currentPath}
                />
              ))}
            </div>
          )}
        </div>
      );
    };
    const App = () => {
      const [viewMode, setViewMode] = useState("list");
      const [scale, setScale] = useState(.48);
      const [pos, setPos] = useState({ x: 0, y: 72 });
      const [allOpen, setAllOpen] = useState(null);
      const [showModal, setShowModal] = useState(false);
      const [searchQuery, setSearchQuery] = useState("");
      const [selectedPerson, setSelectedPerson] = useState(null);
      const dragging = useRef(false);
      const start = useRef({ x: 0, y: 0 });
      const familyData = useMemo(() => normalizeGenealogy(GIA_PHA_DATA), []);
      const todayLunar = useMemo(() => VietnameseLunarCalendar.getLunarToday(), []);
      const birthdays = useMemo(() => getBirthdays(familyData), [familyData]);
      const reminders = useMemo(() => getReminders(familyData, todayLunar), [familyData, todayLunar]);
      const memberEntries = useMemo(() => buildMemberEntries(familyData), [familyData]);
      const searchResults = useMemo(() => {
        const terms = normalizeText(searchQuery).split(/\s+/).filter(Boolean);
        if (!terms.length) return [];
        return memberEntries.filter((item) => terms.every((term) => item.searchText.includes(term)));
      }, [memberEntries, searchQuery]);
      useEffect(() => {
        if (reminders.length) setShowModal(true);
      }, [reminders.length]);
      const beginDrag = (x, y) => {
        dragging.current = true;
        start.current = { x: x - pos.x, y: y - pos.y };
      };
      const moveDrag = (x, y) => {
        if (!dragging.current) return;
        setPos({ x: x - start.current.x, y: y - start.current.y });
      };
      return (
        <div className="shell">
          <PersonDetailModal person={selectedPerson} onClose={() => setSelectedPerson(null)} />
          {showModal && (
            <div className="modal-backdrop">
              <section className="modal">
                <div className="modal-head">
                  <Icon name="bell-ring" size={34} className="mx-auto mb-3 modal-icon" />
                  <h2 className="font-serif text-2xl font-black">Ngày giỗ sắp tới</h2>
                  <p className="mt-2 text-xs font-semibold opacity-70">Theo ngày âm lịch đang hiển thị: {todayLunar.label}</p>
                </div>
                <div className="modal-list">
                  {reminders.map((item, idx) => (
                    <div className="reminder-row" key={idx}>
                      <div>
                        <p className="text-sm font-extrabold leading-snug text-slate-800">{item.fullName}</p>
                        <p className="mt-1 text-[11px] font-bold modal-date">Ngày: {item.date}</p>
                      </div>
                      <span className={`days-pill ${item.days === 0 ? "today" : ""}`}>{item.days === 0 ? "Hôm nay" : `Còn ${item.days} ngày`}</span>
                    </div>
                  ))}
                </div>
                <div className="p-4">
                  <button className="action-button w-full modal-close" onClick={() => setShowModal(false)}>Đóng</button>
                </div>
              </section>
            </div>
          )}
          <header className="topbar">
            <div className="flex items-center gap-4 min-w-0">
              <div className="crest"><Icon name="scroll-text" size={27} /></div>
              <div className="min-w-0">
                <h1 className="font-serif text-[22px] sm:text-[28px] font-black leading-tight brand-title">Gia Phả Phạm Tộc </h1>
                <p className="mt-1 text-xs font-bold brand-sub">{todayLunar.label} · Tháng {CURRENT_SOLAR_MONTH} dương lịch</p>
              </div>
            </div>
            <nav className="segmented" aria-label="Chế độ xem">
              <button className={viewMode === "list" ? "active" : ""} onClick={() => setViewMode("list")}>Danh sách</button>
              <button className={viewMode === "tree" ? "active" : ""} onClick={() => setViewMode("tree")}>Sơ đồ cây</button>
            </nav>
          </header>
          {birthdays.length > 0 && (
            <section className="notice">
              <span className="notice-label"><Icon name="cake" size={13} /> Sinh nhật tháng {CURRENT_SOLAR_MONTH}</span>
              <marquee className="text-xs font-extrabold" scrollamount="4">
                {birthdays.map((m) => `Chúc mừng sinh nhật: ${m.fullName} (${shortSolarDate(m.birthSolar)})`).join("  •  ")}
              </marquee>
            </section>
          )}
          <main>
            {viewMode === "list" ? (
              <div className="list-scroll">
                <div className="list-inner">
                  <div className="toolbar">
                    <div>
                      <p className="text-[11px] font-black uppercase tracking-[.18em] section-kicker">Dòng họ Phạm</p>
                      <h2 className="font-serif text-xl font-black section-title">Danh sách thành viên</h2>
                    </div>
                    <button className="action-button" onClick={() => setAllOpen(!allOpen)}>
                      <Icon name={allOpen ? "folder-minus" : "folder-plus"} size={15} />
                      {allOpen ? "Thu gọn" : "Mở hết"}
                    </button>
                  </div>
                  <SearchPanel
                    query={searchQuery}
                    onQueryChange={setSearchQuery}
                    results={searchResults}
                    total={memberEntries.length}
                    onSelect={setSelectedPerson}
                  />
                  <MemberItem data={familyData} forceOpen={allOpen} onSelect={setSelectedPerson} />
                </div>
              </div>
            ) : (
              <div
                className="tree-stage"
                onWheel={(e) => setScale((s) => Math.min(1.8, Math.max(.16, s + (e.deltaY > 0 ? -.04 : .04))))}
                onMouseDown={(e) => beginDrag(e.clientX, e.clientY)}
                onMouseMove={(e) => moveDrag(e.clientX, e.clientY)}
                onMouseUp={() => dragging.current = false}
                onMouseLeave={() => dragging.current = false}
                onTouchStart={(e) => beginDrag(e.touches[0].clientX, e.touches[0].clientY)}
                onTouchMove={(e) => moveDrag(e.touches[0].clientX, e.touches[0].clientY)}
                onTouchEnd={() => dragging.current = false}
              >
                <div className="tree-canvas" style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})` }}>
                  <TreeNode data={familyData} onSelect={setSelectedPerson} />
                </div>
                <div className="tree-controls">
                  <button className="icon-button" onClick={() => setScale((s) => Math.min(1.8, s + .06))} aria-label="Phóng to"><Icon name="plus" /></button>
                  <button className="icon-button" onClick={() => setScale((s) => Math.max(.16, s - .06))} aria-label="Thu nhỏ"><Icon name="minus" /></button>
                  <button className="icon-button primary" onClick={() => { setPos({ x: 0, y: 72 }); setScale(.48); }} aria-label="Đặt lại"><Icon name="rotate-ccw" size={18} /></button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
