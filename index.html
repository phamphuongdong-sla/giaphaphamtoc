              </div>
              <div className="brand-text">
                <p className="brand-kicker">Lưu trữ thế hệ</p>
                <h1 className="brand-title">Gia Phả Phạm Tộc</h1>
                <p className="brand-sub">{todayLunar.label} · Tháng {CURRENT_SOLAR_MONTH} dương lịch</p>
              </div>
            </div>
            <nav className="segmented" aria-label="Chế độ xem">
              <button className={viewMode === "list" ? "active" : ""} onClick={() => setViewMode("list")}>
                Danh sách
              </button>
              <button className={viewMode === "lich" ? "active" : ""} onClick={() => setViewMode("lich")}>
                Lịch giỗ
              </button>
              <button className={viewMode === "tree" ? "active" : ""} onClick={() => setViewMode("tree")}>
                Sơ đồ
              </button>
            </nav>
          </header>

          {/* Birthday Bar */}
          {birthdays.length > 0 && (
            <section className="notice">
              <span className="notice-badge">
                <Icon name="cake" size={12} /> Sinh nhật tháng {CURRENT_SOLAR_MONTH}
              </span>
              <marquee scrollamount="4">
                {birthdays.map((m) => `Chúc mừng sinh nhật: ${m.fullName} (${shortSolarDate(m.birthSolar)})`).join("   •   ")}
              </marquee>
            </section>
          )}

          <main>
            {viewMode === "list" ? (
              <div className="list-scroll">
                <div className="list-inner">
                  <div className="toolbar">
                    <div>
                      <p className="section-kicker">Dòng họ Phạm</p>
                      <h2 className="section-title font-display">Danh sách thành viên</h2>
                    </div>
                    <button className="action-button" onClick={() => setAllOpen(!allOpen)}>
                      <Icon name={allOpen ? "folder-minus" : "folder-plus"} size={14} />
                      {allOpen ? "Thu gọn" : "Mở hết"}
                    </button>
                  </div>

                  {/* Legend màu đời */}
                  <div style={{ display: "flex", flexWrap: "wrap", gap: 6, marginBottom: 12, padding: "8px 10px", borderRadius: 12, background: "rgba(255,252,245,.8)", border: "1px solid rgba(184,137,60,.1)" }}>
                    {[
                      { gen: 1, color: "#c94035", label: "Đời 1" },
                      { gen: 2, color: "#d4943a", label: "Đời 2" },
                      { gen: 3, color: "#3da870", label: "Đời 3" },
                      { gen: 4, color: "#3a7fc4", label: "Đời 4" },
                      { gen: 5, color: "#9060b8", label: "Đời 5+" },
                    ].map(({ gen, color, label }) => (
                      <span key={gen} style={{ display: "inline-flex", alignItems: "center", gap: 5, fontSize: 10, fontWeight: 800, color: "#5a4a3a", letterSpacing: ".03em" }}>
                        <span style={{ width: 10, height: 10, borderRadius: 3, background: color, flexShrink: 0, boxShadow: `0 0 0 2px ${color}22` }} />
                        {label}
                      </span>
                    ))}
                  </div>
                  <SearchPanel
                    query={searchQuery}
                    onQueryChange={setSearchQuery}
                    results={searchResults}
                    total={memberEntries.length}
                    onSelect={setSelectedPerson}
                  />
                  <MemberItem data={familyData} forceOpen={allOpen} onSelect={setSelectedPerson} />
                </div>
              </div>
            ) : viewMode === "lich" ? (
              <div className="lich-scroll">
                <div className="lich-inner">
                  <div className="toolbar">
                    <div>
                      <p className="section-kicker">Âm lịch · Dương lịch</p>
                      <h2 className="section-title font-display">Lịch giỗ & Sinh nhật</h2>
                    </div>
                  </div>
                  <div className="lich-year-nav">
                    <button className="lich-year-btn" onClick={() => setLichYear(y => y - 1)}><Icon name="chevron-left" size={18} /></button>
                    <span className="lich-year-label">Năm {lichYear}</span>
                    <button className="lich-year-btn" onClick={() => setLichYear(y => y + 1)}><Icon name="chevron-right" size={18} /></button>
                  </div>
                  <div className="lich-tab-row">
                    {Array.from({ length: 12 }, (_, i) => {
                      const m = i + 1;
                      const hasGio  = lichData.gio.some(e => e.solarMonth === m);
                      const hasSinh = lichData.sinh.some(e => e.solarMonth === m);
                      return (
                        <button key={m} className={`lich-tab-btn ${lichMonth === m ? "active" : ""}`} onClick={() => setLichMonth(m)}>
                          Th.{m}
                          {(hasGio || hasSinh) && <span className="dot" />}
                        </button>
                      );
                    })}
                  </div>
                  {(() => {
                    const gioThisMonth = lichData.gio.filter(e => e.solarMonth === lichMonth).sort((a,b) => a.solarDay - b.solarDay);
                    const sinhThisMonth = lichData.sinh.filter(e => e.solarMonth === lichMonth).sort((a,b) => a.solarDay - b.solarDay);
                    const getBadge = (e) => {
                      if (e.days === 0)              return { cls: "today",  label: "Hôm nay" };
                      if (e.days > 0 && e.days <= 7) return { cls: "soon",   label: `${e.days} ngày nữa` };
                      if (e.days > 0)                return { cls: "future", label: `${e.days} ngày nữa` };
                      return { cls: "past", label: "Đã qua" };
                    };
                    const LichRow = ({ e }) => {
                      const badge = getBadge(e);
                      return (
                        <div className="lich-row">
                          <div className="lich-day">
                            <span className="lich-day-num">{e.solarDay}</span>
                            <span className="lich-day-label">Th.{e.solarMonth}</span>
                          </div>
                          <div>
                            <p className="lich-name font-serif">{e.fullName}</p>
                            <p className="lich-meta">
                              {e.type === "gio" ? `Âm lịch: ${e.lunarDay}/${e.lunarMonth}` : `Dương lịch: ${e.solarDay}/${e.solarMonth}/${e.solarYear}`}
                            </p>
                          </div>
                          <span className={`lich-days-badge ${badge.cls}`}>{badge.label}</span>
                        </div>
                      );
                    };
                    return (
                      <>
                        <div className="lich-section">
                          <div className="lich-section-head gio">
                            <Icon name="moon" size={13} />
                            Ngày giỗ · Tháng {lichMonth} · {gioThisMonth.length} ngày
                          </div>
                          <div className="lich-rows">
                            {gioThisMonth.length
                              ? gioThisMonth.map((e,i) => <LichRow key={i} e={e} />)
                              : <p className="lich-empty">Không có ngày giỗ trong tháng này</p>
                            }
                          </div>
                        </div>
                        <div className="lich-section">
                          <div className="lich-section-head sinh">
                            <Icon name="cake" size={13} />
                            Sinh nhật · Tháng {lichMonth} · {sinhThisMonth.length} người
                          </div>
                          <div className="lich-rows">
                            {sinhThisMonth.length
                              ? sinhThisMonth.map((e,i) => <LichRow key={i} e={e} />)
                              : <p className="lich-empty">Không có sinh nhật trong tháng này</p>
                            }
                          </div>
                        </div>
                      </>
                    );
                  })()}
                </div>
              </div>
            ) : (
              <div
                className="tree-stage"
                onWheel={(e) => { e.preventDefault(); setScale((s) => Math.min(1.8, Math.max(.16, s + (e.deltaY > 0 ? -.04 : .04)))); }}
                onMouseDown={(e) => beginDrag(e.clientX, e.clientY)}
                onMouseMove={(e) => moveDrag(e.clientX, e.clientY)}
                onMouseUp={() => dragging.current = false}
                onMouseLeave={() => dragging.current = false}
                onTouchStart={handleTouchStart}
                onTouchMove={handleTouchMove}
                onTouchEnd={handleTouchEnd}
              >
                <div className="tree-canvas" style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})` }}>
                  <TreeNode data={familyData} onSelect={setSelectedPerson} />
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };
    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
