        .tree-item::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 40px; background: #94a3b8; transform: translateX(-50%); z-index: 1; }
        .tree-item::after { content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 2px; background: #94a3b8; z-index: 0; }

        .tree-item:first-child::before { content: ''; position: absolute; top: 0; left: 50%; width: 50%; height: 40px; border-top: 2px solid #94a3b8; border-left: 2px solid #94a3b8; border-top-left-radius: 16px; background: transparent; transform: none; z-index: 1; }
        .tree-item:first-child::after { display: none; }

        .tree-item:last-child::before { content: ''; position: absolute; top: 0; left: 0; width: 50%; height: 40px; border-top: 2px solid #94a3b8; border-right: 2px solid #94a3b8; border-top-right-radius: 16px; background: transparent; transform: none; z-index: 1; }
        .tree-item:last-child::after { display: none; }

        .tree-item:only-child::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 40px; background: #94a3b8; border: none; border-radius: 0; transform: translateX(-50%); z-index: 1; }

        const LunarConverter = (() => {
            const INT = Math.floor;
            const getJdn = (d, m, y) => {
                if (m <= 2) { y--; m += 12; }
                const a = INT(y / 100);
                return INT(365.25 * (y + 4716)) + INT(30.6001 * (m + 1)) + d + (2 - a + INT(a / 4)) - 1524.5;
            };
            return {
                getLunarToday: () => {
                    const now = new Date();
                    const d = now.getDate(), m = now.getMonth() + 1, y = now.getFullYear();
                    const baseJdn = getJdn(28, 4, 2026), currentJdn = getJdn(d, m, y), diffDays = currentJdn - baseJdn;
                    let ld = 12 + diffDays, lm = 3, ly = 2026;
                    while (ld > 29) { ld -= 30; lm++; }
                    while (ld <= 0) { ld += 30; lm--; }
                    if (lm > 12) { lm = 1; ly++; }
                    if (lm <= 0) { lm = 12; ly--; }
                    return { d: ld, m: lm, y: ly, label: `${ld}/${lm} Âm lịch` };
                }
            };
        })();

                                        { name: "PHẠM THỊ ANH ANH", birth: "1955 Ất Hợi", info: "con bà hai" },
                                    ]
                                }
                            ]
                        }
                    ]
                },
                {
                    name: "Bà ba: NGUYỄN THỊ HOA", birth: "1889 Kỷ Sửu", death: "25-01-2001 Tân tỵ",
                    color: "bg-gradient-to-br from-rose-900 to-red-950 text-rose-50 border-rose-400", deceased: true,
                    children: [
                        {
                            name: "PHẠM NGỌC SINH", birth: "1947 Đinh Hợi",
                            children: [
                                {
                                    name: "Vợ: BÙI THỊ RỤNG", birth: "1945 Ất Dậu",
                                    children: [
                                        { name: "PHẠM THỊ NHUNG", birth: "16-05-1996 (10-04 Kỷ Dậu)" },
                                        {
                                            name: "PHẠM VĂN NGỌC", birth: "18-08-1973 (20-07 Quý Sửu)",
                                            children: [
                                                { name: "Vợ: LÊ THỊ HÀ", birth: "1975 Ất mão", children: [{name: "PHẠM THỊ YẾN", birth: "18-10-1998 (02-09 Mậu Dần)"}, {name: "PHẠM THỊ LINH", birth: "08-12-2005 (08-11 Ất Dậu)"},{name: "PHẠM MINH ANH", birth: "29-12-2013 (27-11 Quý Tỵ)"}] }
                                            ]
                                        },
                                        {
                                            name: "PHẠM ĐỨC CƯỜNG", birth: "26-03-1975 (15-02 Ất Mão)",
                                            children: [
                                                { name: "Vợ: ĐỖ THỊ LOAN", birth: "22-08-1979 (27-06 Quý Mùi)", children: [{name: "PHẠM QUỲNH ANH", birth: "21-02-2002 (10-01 Nhâm Ngọ)"}, {name: "PHẠM QUỲNH GIAO", birth: "01-06-2013 (23-04 Quý Tỵ)"}] }
                                            ]
                                        },
                                        {
                                            name: "PHẠM VĂN TUẤN", birth: "25-09-1978 (22-08 Mậu Ngọ)",
                                            children: [
                                                { name: "Vợ: ĐÀO THỊ NỤ", birth: "17-05-1983 (11-04 Quý Hợi)", children: [{name: "PHẠM THÙY TRANG", birth: "16-02-2008 (10-01 Mậu Tý)"}, {name: "PHẠM DUY KHÁNH", birth: "02-12-2010 (25-10 Canh Dần)"}] }
                                            ]
                                        },
                                        {
                                            name: "PHẠM VĂN TRỌNG", birth: "17-11-1980 (10-10 Canh Thân)",
                                            children: [
                                                { name: "Vợ: TRẦN THỊ NGA", birth: "25-04-1988 (09-03 Mậu THìn)", children: [{name: "PHẠM MINH THƯ", birth: "17-12-2011 (22-11 Tân Mão)"}, {name: "PHẠM MINH TUYỀN", birth: "25-05-2013 (15-04 Quý Tỵ)"},{name: "PHẠM THỦY TIÊN", birth: "05-10-2016 (03-09 Bính Thân)"}] }
                                            ]
                                        },
                                        { name: "PHẠM THỊ THỦY", birth: "28-10-1983 (25-09 Quý Hợi)" },
                                    ]
                                }
                            ]
                        }
                    ]
                }
            ]
        };

        // HÀM TÁCH NGÀY VÀ THÁNG DƯƠNG LỊCH ĐỂ SO SÁNH LOGIC MỚI
        const parseBirthDate = (birthStr) => {
            if (!birthStr) return null;
            const match = birthStr.match(/(\d{1,2})[-/](\d{1,2})/);
            return match ? { d: parseInt(match[1]), m: parseInt(match[2]) } : null;
        };

        const getShortBirth = (birthStr) => {
            if (!birthStr) return "";
            const match = birthStr.match(/(\d{1,2})[-/](\d{1,2})/);
            return match ? `${match[1]}/${match[2]}` : "";
        };

        // ĐỆ QUY QUÉT THÀNH VIÊN SINH NHẬT: THÊM CHA/MẸ/ÔNG BÀ ĐỂ NHẬN DIỆN MỐI QUAN HỆ
        const scanAllBirthdays = (node, parentNode, grandparentNode, list) => {
            if (!node.deceased) {
                const bDate = parseBirthDate(node.birth);
                if (bDate && bDate.m === CURRENT_SOLAR_MONTH && bDate.d >= CURRENT_SOLAR_DAY) {
                    let fullRelationName = node.name;

                    // Kiểm tra nếu là VỢ
                    if (fullRelationName.startsWith("Vợ:") || fullRelationName.startsWith("Bà cả:") || fullRelationName.startsWith("Bà hai:") || fullRelationName.startsWith("Bà ba:")) {
                        const cleanWife = fullRelationName.replace(/^(Vợ:|Bà cả:|Bà hai:|Bà ba:)\s*/i, "").trim();
                        const husbandName = parentNode ? parentNode.name : "Ẩn danh";
                        fullRelationName = `${cleanWife} (Vợ ông ${husbandName})`;
                    }
                    // Kiểm tra nếu là CON (Có nút cha/mẹ)
                    else if (parentNode) {
                        let fatherName = "";
                        // Nếu cấp trên trực tiếp là Vợ, thì tên bố sẽ nằm ở cấp ông bà (grandparent)
                        if (parentNode.name.startsWith("Vợ:") || parentNode.name.startsWith("Bà cả:") || parentNode.name.startsWith("Bà hai:") || parentNode.name.startsWith("Bà ba:")) {
                            fatherName = grandparentNode ? grandparentNode.name : "";
                        } else {
                            fatherName = parentNode.name;
                        }

                        // Đảm bảo không gắn nhầm nhãn "con bố" cho các cụ tổ không rõ thông tin bố
                        if (fatherName && !fatherName.startsWith("Vợ:") && !fatherName.startsWith("Bà")) {
                            fullRelationName = `${fullRelationName} (Con bố ${fatherName})`;
                        }
                    }

                    list.push({ name: fullRelationName, birth: node.birth });
                }
            }
            if (node.children) {
                node.children.forEach(c => scanAllBirthdays(c, node, parentNode, list));
            }
        };

        const parseDate = (str) => {
            if (!str) return null;
            const match = str.match(/(\d{1,2})[-/](\d{1,2})/);
            return match ? { d: parseInt(match[1]), m: parseInt(match[2]) } : null;
        };

        const calcLunarDiff = (deathDate, today) => {
            let diff = (deathDate.m - today.m) * 30 + (deathDate.d - today.d);
            if (diff < 0) diff += 354;
            return (diff >= 0 && diff <= 20) ? diff : null;
        };

        const scanAllReminders = (node, today, list) => {
            const mainDeath = parseDate(node.death);
            if (mainDeath) {
                const diff = calcLunarDiff(mainDeath, today);
                if (diff !== null) list.push({ name: node.name, days: diff, date: node.death });
            }
            if (node.children) node.children.forEach(c => scanAllReminders(c, today, list));
        };

        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const InfoBox = ({ data, isDark = false }) => (
            <div className={`text-left space-y-1.5 text-[11px] mt-2 pt-2 border-t ${isDark ? 'border-white/20' : 'border-current/10'}`}>
                <div className={`flex items-center gap-2 font-medium ${isDark ? 'text-white/70' : 'text-slate-500'}`}>
                    <Icon name="sun" size={10} className="text-amber-500"/> Sinh: <b>{data.birth}</b>
                </div>
                {data.death && data.death !== "00-00-0000" && (
                    <div className={`flex items-center gap-2 font-bold ${isDark ? 'text-amber-300' : 'text-rose-700'}`}>
                        <Icon name="moon" size={10}/> Giỗ: <b>{data.death}</b>
                    </div>
                )}
                {data.info && (
                    <div className={`${isDark ? 'bg-white/10 text-white/90' : 'bg-black/5 text-slate-600'} p-2 rounded-lg text-[10px] italic mt-1.5 leading-snug`}>
                        {data.info}
                    </div>
                )}
            </div>
        );

        const MemberItem = ({ data, level = 0, forceOpen }) => {
            const [isOpen, setIsOpen] = useState(level < 1);
            const hasChildren = data.children && data.children.length > 0;
            const isCustomColor = !!data.color;

            const bDate = parseBirthDate(data.birth);
            const isBirthdayActive = !data.deceased && bDate && bDate.m === CURRENT_SOLAR_MONTH && bDate.d >= CURRENT_SOLAR_DAY;

            useEffect(() => { if (forceOpen !== null) setIsOpen(forceOpen); }, [forceOpen]);

            return (
                <div className="w-full relative">
                    <div className={`member-card-ml ${data.color || ''} ${isBirthdayActive ? 'birthday-glow-card' : ''}`} onClick={() => hasChildren && setIsOpen(!isOpen)}>
                        {data.deceased && <div className="deceased-ribbon"></div>}

                        {isBirthdayActive && (
                            <div className="birthday-ribbon-in">
                                <Icon name="gift" size={10} className="animate-pulse" /> CHÚC MỪNG SINH NHẬT 🎉
                            </div>
                        )}

                        {/* TĂNG PADDING TRÁI (pl-14) KHI THÀNH VIÊN ĐÃ MẤT ĐỂ TRANH RUY BĂNG ĐEN ĐÈ CHỮ */}
                        <div className={`node-content-wrapper z-10 pt-4 pb-4 pr-4 ${data.deceased ? 'pl-14' : 'pl-6'}`}>
                            <div className="flex justify-between items-start">
                                <div className={`flex-1 ${isBirthdayActive ? 'mt-2' : 'mt-1'}`}>
                                    {data.title && <span className="bg-amber-600 text-white text-[9px] px-2 py-0.5 rounded-full mb-1.5 inline-block font-black uppercase">{data.title}</span>}
                                    <h3 className={`font-serif font-bold ${isCustomColor ? 'text-white' : (data.deceased ? 'text-slate-800' : (isBirthdayActive ? 'text-amber-900' : 'text-red-900'))} ${level === 0 ? 'text-xl' : 'text-[15px]'}`}>
                                        {data.name}
                                    </h3>
                                </div>
                                {hasChildren && <Icon name={isOpen ? "chevron-up" : "chevron-down"} size={18} className={`${isCustomColor ? 'text-white/50' : 'text-slate-300'} ml-2 mt-1`}/>}
                            </div>
                            <InfoBox data={data} isDark={isCustomColor} />
                        </div>
                    </div>
                    {hasChildren && isOpen && (
                        <div className="node-container-ml">
                            {data.children.map((child, i) => <MemberItem key={i} data={child} level={level + 1} forceOpen={forceOpen} />)}
                        </div>
                    )}
                </div>
            );
        };

        const TreeNode = ({ data, level = 0 }) => {
            const [isOpen, setIsOpen] = useState(level < 1);
            const hasChildren = data.children && data.children.length > 0;
            const isSpouse = data.name.startsWith("Vợ:") || data.name.startsWith("Bà cả:") || data.name.startsWith("Bà hai:") || data.name.startsWith("Bà ba:");
            const isCustomColor = !!data.color;

            const bDate = parseBirthDate(data.birth);
            const isBirthdayActive = !data.deceased && bDate && bDate.m === CURRENT_SOLAR_MONTH && bDate.d >= CURRENT_SOLAR_DAY;

            const nodeStyle = data.color || (level === 0 ? 'bg-red-950 text-amber-50 border-amber-600' : (isSpouse ? 'bg-amber-50 border-amber-200 italic text-slate-800' : 'bg-white text-slate-800 border-slate-200'));

            return (
                <div className={`tree-item ${level === 0 ? 'is-root-node' : ''}`}>
                    <div className={`node-card ${nodeStyle} ${isBirthdayActive ? 'birthday-glow-card' : ''}`} onClick={() => hasChildren && setIsOpen(!isOpen)}>
                        {data.title && <div className="badge-truong-toc">{data.title}</div>}

                        {isBirthdayActive && (
                            <div className="birthday-ribbon-in">
                                <Icon name="cake" size={10} className="animate-pulse" /> CHÚC MỪNG SINH NHẬT🥳
                            </div>
                        )}

                        <div className="node-content-wrapper p-5">
                            {data.deceased && <div className="deceased-ribbon"></div>}

                            <div className={`z-20 relative flex flex-col h-full ${isBirthdayActive ? 'mt-2' : ''}`}>
                                <h3 className={`font-serif font-bold text-center leading-tight mb-2 ${level === 0 ? 'text-2xl' : 'text-[17px]'} ${isCustomColor ? 'text-white' : (isBirthdayActive ? 'text-amber-950' : '')}`}>
                                    {data.name}
                                </h3>
                                <InfoBox data={data} isDark={isCustomColor || level === 0} />
                                {hasChildren && (
                                    <div className={`mt-auto pt-2 flex justify-center ${isCustomColor ? 'opacity-50' : 'opacity-30'}`}>
                                        <Icon name={isOpen ? "chevron-up" : "chevron-down"} size={14} />
                                    </div>
                                )}
                            </div>
                        </div>
                        {hasChildren && isOpen && <div className="parent-line" />}
                    </div>
                    {hasChildren && isOpen && (
                        <div className="tree-branch">
                            {data.children.map((child, i) => <TreeNode key={i} data={child} level={level + 1} />)}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [viewMode, setViewMode] = useState('list');
            const [scale, setScale] = useState(0.45);
            const [pos, setPos] = useState({ x: 0, y: 80 });
            const [allOpen, setAllOpen] = useState(null);
            const [reminders, setReminders] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const isDragging = useRef(false);
            const startPos = useRef({ x: 0, y: 0 });
            const todayLunar = useMemo(() => LunarConverter.getLunarToday(), []);

            // Quét danh sách sinh nhật theo cấu trúc cây cải tiến mới
            const birthdayList = useMemo(() => {
                const list = [];
                scanAllBirthdays(GIA_PHA_DATA, null, null, list);
                return list;
            }, []);

            useEffect(() => {
                const list = [];
                scanAllReminders(GIA_PHA_DATA, todayLunar, list);
                if (list.length > 0) { setReminders(list.sort((a,b) => a.days - b.days)); setShowModal(true); }
            }, [todayLunar]);

            return (
                <div className="h-screen w-full flex flex-col overflow-hidden bg-[#fdfaf5]">
                    {showModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] w-full max-w-sm overflow-hidden animate-pop shadow-2xl border-t-8 border-rose-800">
                                <div className="p-8 text-center bg-rose-50">
                                    <Icon name="bell-ring" size={32} className="text-rose-600 mx-auto mb-4" />
                                    <h2 className="font-serif text-2xl font-black text-slate-800 uppercase leading-tight">Ngày Giỗ Sắp Tới</h2>
                                </div>
                                <div className="p-6 space-y-3 max-h-[40vh] overflow-y-auto">
                                    {reminders.map((item, idx) => (
                                        <div key={idx} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                                            <div><p className="font-bold text-slate-800 text-sm">{item.name}</p><p className="text-[10px] text-rose-600 font-bold">Ngày: {item.date}</p></div>
                                            <div className={`px-3 py-1.5 rounded-lg text-[9px] font-black uppercase ${item.days === 0 ? 'bg-red-600 text-white animate-pulse' : 'bg-amber-100 text-amber-900'}`}>{item.days === 0 ? "Hôm nay" : `Còn ${item.days} ngày`}</div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6"><button onClick={() => setShowModal(false)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest shadow-lg">Đóng</button></div>
                            </div>
                        </div>
                    )}

                    <header className="h-24 header-glass text-white flex items-center justify-between px-6 shrink-0 sticky top-0">
                        <div className="flex items-center gap-3"><div className="bg-amber-600 p-2.5 rounded-2xl shadow-inner border border-amber-500/30"><Icon name="scroll" size={22}/></div><div><h1 className="font-serif text-lg font-black text-amber-200 uppercase leading-none tracking-tight">PHẠM TỘC GIA PHẢ</h1><p className="text-white/50 text-[12px] font-bold uppercase mt-1.5 tracking-widest">{todayLunar.label}</p></div></div>
                        <div className="flex bg-black/20 p-1.5 rounded-2xl border border-white/10">
                            <button onClick={() => setViewMode('list')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${viewMode === 'list' ? 'bg-amber-600 text-white shadow-lg' : 'text-white/40'}`}>DANH SÁCH</button>
                            <button onClick={() => setViewMode('tree')} className={`px-5 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all ${viewMode === 'tree' ? 'bg-amber-600 text-white shadow-lg' : 'text-white/40'}`}>SƠ ĐỒ CÂY</button>
                        </div>
                    </header>

                    {/* BANNER CHỮ CHẠY BANNER SINH NHẬT HIỂN THỊ RÕ RÀNG MỐI QUAN HỆ */}
                    {birthdayList.length > 0 && (
                        <div className="bg-gradient-to-r from-amber-500 via-yellow-400 to-amber-500 text-slate-900 py-2.5 px-4 shadow-md overflow-hidden flex items-center shrink-0 border-b border-amber-600/30 z-40">
                            <div className="flex items-center gap-1.5 font-black text-[10px] uppercase shrink-0 bg-red-600 text-white px-3 py-1 rounded-full border border-red-700 shadow-sm animate-pulse">
                                <Icon name="cake" size={12} />
                                Sinh Nhật Sắp Tới (Tháng {CURRENT_SOLAR_MONTH}):
                            </div>
                            <div className="w-full overflow-hidden relative flex items-center whitespace-nowrap ml-3">
                                <marquee className="font-bold text-xs text-slate-900 tracking-wide" scrollamount="4">
                                    {birthdayList.map((m, i) => `🎉 Chúc mừng sinh nhật: ${m.name} (${getShortBirth(m.birth)})`).join(' ✦✦✦ ')}
                                </marquee>
                            </div>
                        </div>
                    )}

                    <main className="flex-1 relative overflow-hidden bg-[#fdfaf5]">
                        {viewMode === 'list' ? (
                            <div className="absolute inset-0 overflow-y-auto" style={{ WebkitOverflowScrolling: 'touch' }}>
                                <div className="p-4 max-w-2xl mx-auto pb-32">
                                    <div className="flex justify-end mb-4"><button onClick={() => setAllOpen(!allOpen)} className="px-4 py-2 bg-slate-900 text-white font-black rounded-xl text-[10px] uppercase shadow-lg active:scale-95">{allOpen ? "Thu gọn" : "Mở hết"}</button></div>
                                    <MemberItem data={GIA_PHA_DATA} forceOpen={allOpen} />
                                </div>
                            </div>
                        ) : (
                            <div className="h-full w-full grab-container" onWheel={(e) => setScale(s => Math.min(2, Math.max(0.1, s + (e.deltaY > 0 ? -0.05 : 0.05))))} onMouseDown={e => { isDragging.current = true; startPos.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }} onMouseMove={e => isDragging.current && setPos({ x: e.clientX - startPos.current.x, y: e.clientY - startPos.current.y })} onMouseUp={() => isDragging.current = false} onTouchStart={e => { isDragging.current = true; startPos.current = { x: e.touches[0].clientX - pos.x, y: e.touches[0].clientY - pos.y }; }} onTouchMove={e => isDragging.current && setPos({ x: e.touches[0].clientX - startPos.current.x, y: e.touches[0].clientY - startPos.current.y })} onTouchEnd={() => isDragging.current = false}>
                                <div style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transformOrigin: 'top center' }} className="absolute inset-0 flex justify-center pt-10 transition-transform duration-75"><TreeNode data={GIA_PHA_DATA} /></div>
                                <div className="absolute bottom-8 right-8 flex flex-col gap-3"><button onClick={() => setScale(s => s + 0.05)} className="w-12 h-12 bg-white rounded-xl shadow-xl flex items-center justify-center text-slate-800 border"><Icon name="plus" /></button><button onClick={() => setScale(s => s - 0.05)} className="w-12 h-12 bg-white rounded-xl shadow-xl flex items-center justify-center text-slate-800 border"><Icon name="minus" /></button><button onClick={() => {setPos({x:0, y:80}); setScale(0.45);}} className="w-12 h-12 bg-amber-600 rounded-xl shadow-xl flex items-center justify-center text-white"><Icon name="refresh-cw" size={18}/></button></div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
