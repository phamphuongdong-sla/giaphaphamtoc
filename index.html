<!DOCTYPE html>

<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>

    <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;900&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">

    <style>
        :root { --bg-paper: #fdfaf5; }
        body { font-family: 'Be Vietnam Pro', sans-serif; background-color: var(--bg-paper); margin: 0; color: #1e293b; width: 100vw; height: 100vh; overflow: hidden; }
        .font-serif { font-family: 'Playfair Display', serif; }
        .grab-container { cursor: grab; background-image: radial-gradient(#e5e7eb 1px, transparent 1px); background-size: 30px 30px; touch-action: none; position: relative; width: 100%; height: 100%; }
        .node-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; background: white; }
        .node-card.highlight { ring: 4px solid #fbbf24; transform: scale(1.05); z-index: 50; }
        
        /* Cấu trúc cây chuẩn */
        .tree-branch { display: flex; padding-top: 40px; position: relative; }
        .tree-item { position: relative; padding: 0 15px; display: flex; flex-direction: column; align-items: center; }
        .tree-item::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 40px; background: #d1d5db; transform: translateX(-50%); }
        .tree-item::after { content: ''; position: absolute; top: 0; width: 100%; height: 2px; background: #d1d5db; }
        .tree-item:first-child::after { left: 50%; width: 50%; }
        .tree-item:last-child::after { right: 50%; width: 50%; }
        .tree-item:only-child::after { display: none; }

        .list-viewport { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .member-card-ml { background: white; border-radius: 16px; border: 1px solid #f1f5f9; margin-bottom: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .header-glass { background: rgba(69, 10, 10, 0.98); backdrop-filter: blur(10px); z-index: 100; }
        
        @keyframes fadeInScale { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .animate-popup { animation: fadeInScale 0.4s ease-out forwards; }
    </style>
</head>
<body>
    <div id="root"></div>

                                { name: "PHẠM THỊ NHIÊN", birth: "1948 Mậu Tý", info: "có 5 người con sống ở Diêm Điền" },
                                { name: "PHẠM MINH ĐỨC", birth: "18-10-1953 Quý Tỵ", death: "02-08-2022 Nhâm Dần", deceased: true, info: "Vợ: HOÀNG THỊ XUYẾN Sinh 01-10-1949 Kỷ Sửu Mất 24-02-2025 Ất Tỵ có 3 người con",
                                    children: [

                                        { name: "PHẠM PHƯƠNG ĐÔNG", birth: "29-12-1981 (04-12 Tân Dậu)", info: "Vợ HOÀNG THANH HUYỀN Sinh 02-09-1985 (Ất Sửu)", children: [{name: "PHẠM HOÀNG DƯƠNG", birth: "14-06-2011 (Tân Mão)"}] },
                                        { name: "PHẠM PHƯƠNG NAM", birth: "20-10-1984 (26-09 Giáp tý)", info: "Vợ PHAN THỊ HỒNG Sinh 04-10-1989 (Kỷ Tỵ) Có 2 con", children: [{name: "PHẠM THỦY PHƯƠNG ANH", birth: "07-12-2012 (04-11 Nhâm Thìn)"}, {name: "PHẠM NAM ANH", birth: "29-08-2016 (27-07 Bính Thân)"}] },
                                    ]},
                                {
                                    name: "PHẠM NGỌC THANH", birth: "13-09-1959 Kỷ Hợi", death: "19-08-2008 Mậu Tý", deceased: true, info: "Vợ: ĐẶNG PHƯƠNG DUNG Sinh 21-10-1960 (01-09 Canh tý) có 3 con",
                                    children: [
                                        { name: "PHẠM DIỆU HƯƠNG", birth: "20-11-1983 (16-10 Quý Hợi)"},
                                        { name: "PHẠM DIỆU VÂN", birth: "31-07-1986 (25-06 Bính Dần)"},
                                        { name: "PHẠM MINH ĐÔ", birth: "27-08-1990 (06-07 Canh Ngọ)", info: "Vợ NGUYỄN THỊ LÝ HƯỜNG Sinh 22-05-1990 (28-04 Canh Ngọ) Có 3 con", children: [{name: "PHẠM TRÚC LAM", birth: "22-12-2017 (04-11 Nhâm Thìn)"}, {name: "PHẠM MINH QUÂN", birth: "8/9/2020"}, {name: "PHẠM MINH DƯƠNG", birth: "10/7/2024"}] },
                                    ]
                                },
                            ]
                        },
                        { name: "PHẠM NGỌC NHẬT", birth: "1931 Tân Mùi", death: "03-05-1987 Đinh Mão", deceased: true, info: "Vợ ĐINH THỊ LOÁN Sinh 1933 Quý Mão Mất 17-02-1982 Nhâm Tuất",
                        children: [
                                { name: "PHẠM NGỌC TUẤN", birth: "30-10-1960 (11-09 Canh tý)", info: "Vợ TRẦN THỊ PHƯƠNG Sinh 31-08-1959 (27-07 Kỷ Hợi) Có 3 con", children: [{name: "PHẠM NGỌC ANH", birth: "18-01-1987 (18-12 Bính Dần)"}, {name: "PHẠM TRÂN TUÂN", birth: "27-12-1999 (20-11 Kỷ Mão)"}, {name: "PHẠM THỊ HƯƠNG LAN", birth: "25-07-2002 (20-06 Nhâm Ngọ)"}] },
                                { name: "PHẠM ĐỨC CƯỜNG", birth: "09-05-1971 (15-04 Tân Hợi)", info: "Vợ NGUYỄN THỊ HỒNG NGA Sinh 29-03-1973 (26-02 Quý Sửu) Có 2 con", children: [{name: "PHẠM ĐỨC MẠNH", birth: "26-03-1995 (26-02 ẤT Hợi)"}, {name: "PHẠM ĐỨC CÔNG", birth: "08-10-2000 (11-09-2000 Canh Thìn)"}] },
                            ]

                    ]
                },
                {
                    name: "Bà hai: NGUYỄN THỊ YẾN", birth: "1895 Ất Mùi", death: "21-04-1945 Ất Dậu", color: "bg-emerald-900", deceased: true,
                    children: [
                        {
                            name: "PHẠM NGỌC THẠCH", birth: "1929 Kỷ tỵ", death: "Đã Mất", deceased: true, info: "Vợ cả: NGUYỄN THỊ KIM NGÂN Sinh 1937 Đinh Sửu - Vợ hai: PHẠM THỊ THU Sinh 1952 Nhâm Thìn",
                            children: [
                                { name: "PHẠM NGỌC SƠN", birth: "17-11-1964 (13-10 Giáp Thìn)", info: "Vợ: DƯƠNG THỊ HUỆ Sinh 02-12-1969 (26-10 Kỷ Dậu) có 2 con", children: [{name: "PHẠM THỊ THỦY", birth: "09-05-1993 (18-04 Quý Dậu)"}, {name: "PHẠM ĐÔNG TRIỀU", birth: "10-11-1996 (30-09 Bính Tý)"}] },
                                { name: "PHẠM HỒNG THẮNG", birth: "31-08-1976 (14-07 Bính Thìn)", info: "Vợ: DƯƠNG THỊ TUYẾT HUỆ Sinh 23-11-1985 (12-10 Ất Sửu)", children: [{name: "PHẠM KHÁNH DUY", birth: "12-03-2007 (23-01 Đinh Hợi)"}, {name: "PHẢM HẢI YẾN", birth: "15-02-2009 (21-01 Kỷ Sửu)"}] },
                            ]
                        }
                    ]
                },
                {
                    name: "Bà ba: NGUYỄN THỊ HOA", birth: "1889 Kỷ Sửu", death: "25-01-2001 Tân tỵ", color: "bg-amber-900", deceased: true,
                    children: [
                        {
                            name: "PHẠM NGỌC SINH", birth: "1947 Đinh Hợi", info: "Vợ: BÙI THỊ DỤNG Sinh 1945 Ất Dậu",
                            children: [
                                { name: "PHẠM VĂN NGỌC", birth: "18-08-1973 (20-07 Quý Sửu)", info: "Vợ: LÊ THỊ HÀ Sinh 1975 Ất Mão", children: [{name: "PHẠM THỊ YẾN", birth: "18-10-1998 (02-09 Mậu Dần)"}, {name: "PHẠM THỊ LINH", birth: "08-12-2005 (08-11 Ất Dậu)"},{name: "PHẠM MINH ANH", birth: "29-12-2013 (27-11 Quý Tỵ)"}] },
                                { name: "PHẠM VĂN TRỌNG", birth: "17-11-1980 (10-10 Canh Thân)", info: "Vợ: TRẦN THỊ NGA Sinh 25-04-1988 (09-03 Mậu THìn)", children: [{name: "PHẠM MINH THƯ", birth: "17-12-2011 (22-11 Tân Mão)"}, {name: "PHẠM MINH TUYỀN", birth: "25-05-2013 (15-04 Quý Tỵ)"},{name: "PHẠM THỦY TIÊN", birth: "05-10-2016 (03-09 Bính Thân)"}] },
                            ]
                        }
                    ]
                }
            ]
        };

        // --- HỆ THỐNG LỊCH ÂM VÀ NHẮC GIỖ ---
        const LUNAR_TODAY = { day: 12, month: 3 }; // Ngày 28/4/2026 Dương = 12/3 Âm

        const extractDate = (str) => {
            if (!str) return null;
            const match = str.match(/(\d{1,2})[-/](\d{1,2})/);
            return match ? { d: parseInt(match[1]), m: parseInt(match[2]) } : null;
        };

        const scanAnniversaries = (node, results = []) => {
            // Check chính
            let d = extractDate(node.death);
            if (d && d.m === LUNAR_TODAY.month) {
                const diff = d.d - LUNAR_TODAY.day;
                if (diff >= 0 && diff <= 15) results.push({ name: node.name, days: diff, date: node.death });
            }
            // Check ghi chú
            if (node.info && (node.info.includes("Mất") || node.info.includes("Giỗ"))) {
                const parts = node.info.split(/[M|m]ất|[G|g]iỗ/);
                parts.slice(1).forEach(p => {
                    let sd = extractDate(p);
                    if (sd && sd.m === LUNAR_TODAY.month) {
                        const diff = sd.d - LUNAR_TODAY.day;
                        if (diff >= 0 && diff <= 15) {
                            const nameMatch = node.info.match(/([A-ZÀ-Ỹ\s]{5,})/);
                            results.push({ name: nameMatch ? nameMatch[0].trim() : `Người thân cụ ${node.name}`, days: diff, date: `Trong ghi chú (${sd.d}/${sd.m})` });
                        }
                    }
                });
            }
            if (node.children) node.children.forEach(c => scanAnniversaries(c, results));
            return results;
        };

        // --- COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;
        };

        const InfoContent = ({ data }) => (
            <div className="text-[11px] mt-2 pt-2 border-t border-current/10 space-y-1">
                <div className="flex items-center gap-1 opacity-70"><Icon name="sun" size={10}/> Sinh: {data.birth}</div>
                {data.death && <div className="flex items-center gap-1 text-rose-500 font-bold italic"><Icon name="moon" size={10}/> Mất: {data.death} (Âm lịch)</div>}
                {data.info && <div className="bg-black/5 p-2 rounded text-[10px] italic leading-relaxed text-current/80">{data.info}</div>}
            </div>
        );

        const App = () => {
            const [viewMode, setViewMode] = useState('list');
            const [searchTerm, setSearchTerm] = useState("");
            const [anniversaries, setAnniversaries] = useState([]);
            const [showModal, setShowModal] = useState(false);
            const [scale, setScale] = useState(0.5);

            useEffect(() => {
                const list = scanAnniversaries(GIA_PHA_DATA);
                if (list.length > 0) {
                    setAnniversaries(list.sort((a,b) => a.days - b.days));
                    setShowModal(true);
                }
            }, []);

            return (
                <div className="h-screen w-full flex flex-col bg-[#fdfaf5]">
                    {/* MODAL NHẮC GIỖ */}
                    {showModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] w-full max-w-md overflow-hidden animate-popup border-t-8 border-amber-600 shadow-2xl">
                                <div className="p-6 text-center bg-amber-50">
                                    <h2 className="font-serif text-2xl font-black text-amber-900 uppercase">Ngày Giỗ Âm Lịch</h2>
                                    <p className="text-amber-700 text-[10px] font-bold mt-1">Hôm nay: {LUNAR_TODAY.day}/{LUNAR_TODAY.month} Âm</p>
                                </div>
                                <div className="p-4 max-h-[40vh] overflow-y-auto space-y-3">
                                    {anniversaries.map((item, i) => (
                                        <div key={i} className="flex items-center justify-between p-4 bg-slate-50 rounded-2xl border border-slate-100">
                                            <div>
                                                <div className="font-bold text-slate-800">{item.name}</div>
                                                <div className="text-[10px] text-slate-400 font-bold uppercase">{item.date}</div>
                                            </div>
                                            <div className={`px-3 py-1 rounded-full text-[10px] font-black ${item.days === 0 ? 'bg-red-600 text-white animate-pulse' : 'bg-amber-200 text-amber-800'}`}>
                                                {item.days === 0 ? "HÔM NAY" : `CÒN ${item.days} NGÀY`}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowModal(false)} className="w-full py-4 bg-slate-900 text-white font-black text-xs uppercase">Đã xem</button>
                            </div>
                        </div>
                    )}

                    <header className="h-20 header-glass text-white flex items-center justify-between px-6 shrink-0 shadow-lg">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-600 p-2 rounded-xl"><Icon name="scroll" size={20}/></div>
                            <div>
                                <h1 className="font-serif text-lg font-black text-amber-200 uppercase leading-none">PHẠM TỘC GIA PHẢ</h1>
                                <p className="text-[9px] font-bold opacity-60 mt-1">LỊCH ÂM: {LUNAR_TODAY.day}/{LUNAR_TODAY.month}</p>
                            </div>
                        </div>
                        <div className="flex bg-white/10 p-1 rounded-xl">
                            <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg text-[10px] font-bold ${viewMode === 'list' ? 'bg-amber-600 text-white' : 'text-white/40'}`}>DANH SÁCH</button>
                            <button onClick={() => setViewMode('tree')} className={`px-4 py-2 rounded-lg text-[10px] font-bold ${viewMode === 'tree' ? 'bg-amber-600 text-white' : 'text-white/40'}`}>SƠ ĐỒ CÂY</button>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {viewMode === 'list' ? (
                            <div className="list-viewport p-4">
                                <div className="max-w-2xl mx-auto space-y-4">
                                    <input type="text" placeholder="Tìm tên thành viên..." className="w-full p-4 rounded-2xl border-0 shadow-sm outline-none mb-4" onChange={e => setSearchTerm(e.target.value)}/>
                                    <MemberListItem data={GIA_PHA_DATA} searchTerm={searchTerm} />
                                </div>
                            </div>
                        ) : (
                            <div className="w-full h-full grab-container" onWheel={e => setScale(s => Math.min(2, Math.max(0.1, s + (e.deltaY > 0 ? -0.05 : 0.05))))}>
                                <div style={{ transform: `scale(${scale})`, transformOrigin: 'top center' }} className="absolute inset-0 flex justify-center pt-10">
                                    <TreeItem data={GIA_PHA_DATA} searchTerm={searchTerm} />
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        // --- RENDER SƠ ĐỒ CÂY ---
        const TreeItem = ({ data, level = 0, searchTerm }) => {
            const [isOpen, setIsOpen] = useState(level < 2);
            const isMatch = searchTerm && data.name.toLowerCase().includes(searchTerm.toLowerCase());
            const cardClass = level === 0 ? "bg-red-950 text-amber-100 w-80 ring-4 ring-amber-900/20" : level === 1 ? `${data.color} text-white w-72` : "bg-white text-slate-800 w-64 border-slate-200";

            return (
                <div className="tree-item">
                    <div className={`node-card p-5 border ${cardClass} ${isMatch ? 'highlight' : ''}`} onClick={() => data.children && setIsOpen(!isOpen)}>
                        {data.title && <div className="text-[9px] font-black bg-amber-500 text-white px-2 py-0.5 rounded-full mb-2 inline-block uppercase">{data.title}</div>}
                        <h3 className="font-bold text-center text-base">{data.name}</h3>
                        <InfoContent data={data} />
                    </div>
                    {data.children && isOpen && (
                        <div className="tree-branch">
                            {data.children.map((c, i) => <TreeItem key={i} data={c} level={level+1} searchTerm={searchTerm} />)}
                        </div>
                    )}
                </div>
            );
        };

        // --- RENDER DANH SÁCH ---
        const MemberListItem = ({ data, level = 0, searchTerm }) => {
            const [isOpen, setIsOpen] = useState(level < 1);
            const isMatch = searchTerm && data.name.toLowerCase().includes(searchTerm.toLowerCase());
            return (
                <div className="w-full">
                    <div className={`member-card-ml p-4 border-l-4 ${data.color ? 'border-amber-600' : 'border-slate-300'} ${isMatch ? 'ring-2 ring-amber-400' : ''}`} onClick={() => data.children && setIsOpen(!isOpen)}>
                        <div className="flex justify-between items-center">
                            <span className="font-bold text-slate-800">{data.name}</span>
                            {data.children && <Icon name={isOpen ? "chevron-up" : "chevron-down"} size={14} className="opacity-40"/>}
                        </div>
                        <InfoContent data={data} />
                    </div>
                    {data.children && isOpen && (
                        <div className="pl-6 border-l-2 border-slate-200 ml-4 mt-2 space-y-2">
                            {data.children.map((c, i) => <MemberListItem key={i} data={c} level={level+1} searchTerm={searchTerm} />)}
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
