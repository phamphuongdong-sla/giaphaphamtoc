        .tree-item::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 40px; background: #cbd5e1; transform: translateX(-50%); }
        .tree-item::after { content: ''; position: absolute; top: 0; width: 100%; height: 2px; background: #cbd5e1; }

        .tree-item:last-child::after { right: 50%; width: 50%; }
        .tree-item:only-child::after { display: none; }
        .parent-line { position: absolute; bottom: -40px; left: 50%; width: 2px; height: 40px; background: #cbd5e1; transform: translateX(-50%); }

        .list-viewport { height: 100%; overflow-y: auto; -webkit-overflow-scrolling: touch; background: #fdfaf5; }

        @keyframes pop { from { opacity: 0; transform: scale(0.9) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        // --- CÔNG CỤ XỬ LÝ NHẮC GIỖ NÂNG CAO ---
        const LunarDate = {
            getTodayLunar: () => ({ d: 12, m: 3, y: 2026, label: "12/03 Bính Ngọ" })
        };

        const parseDate = (str) => {
            if (!str) return null;
            const match = str.match(/(\d{1,2})[-/](\d{1,2})/);
            return match ? { d: parseInt(match[1]), m: parseInt(match[2]) } : null;
        };

        const calcDiff = (date, today) => {
            let diff = (date.m - today.m) * 30 + (date.d - today.d);
            if (diff < 0) diff += 354;
            return (diff >= 0 && diff <= 20) ? diff : null;
        };

        // Hàm quét nâng cao: tìm nhiều người mất trong 1 chuỗi info
        const scanNotesForDeaths = (node, today, list) => {
            // 1. Check ngày mất chính
            const mainDeath = parseDate(node.death);
            if (mainDeath) {
                const diff = calcDiff(mainDeath, today);
                if (diff !== null) list.push({ name: node.name, days: diff, date: node.death, relation: 'Thành viên' });
            }

            // 2. Check trong info (Cải tiến để bóc tách tên cụ thể)
            if (node.info && (node.info.toLowerCase().includes("mất") || node.info.toLowerCase().includes("giỗ"))) {
                // Tách ghi chú thành các câu/cụm nhỏ bởi dấu chấm hoặc phẩy
                const segments = node.info.split(/[.;]/);

                segments.forEach(seg => {
                    if (seg.toLowerCase().includes("mất") || seg.toLowerCase().includes("giỗ")) {
                        const dateInSeg = parseDate(seg);
                        if (dateInSeg) {
                            const diff = calcDiff(dateInSeg, today);
                            if (diff !== null) {
                                // Tìm tên: Lấy các chữ hoa liên tiếp hoặc cụm từ trước "Mất"
                                const nameMatch = seg.match(/([A-ZÀ-Ỹ][a-zà-ỹ\s]+){2,}/);
                                let displayName = nameMatch ? nameMatch[0].trim() : `Người thân cụ ${node.name}`;

                                // Ghi chú cụ thể vai vế nếu có
                                let role = "";
                                if (seg.includes("Bà cả")) role = "Bà cả ";
                                if (seg.includes("Bà hai")) role = "Bà hai ";

                                list.push({
                                    name: role + displayName,
                                    days: diff,
                                    date: `${dateInSeg.d}/${dateInSeg.m}`,
                                    relation: `Ghi chú ${node.name}`
                                });
                            }
                        }
                    }
                });
            }
            if (node.children) node.children.forEach(c => scanNotesForDeaths(c, today, list));
        };

        // --- COMPONENTS ---
        const Icon = ({ name, size = 16, className = "" }) => {
            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [name]);
            return <i data-lucide={name} className={className} style={{ width: size, height: size }}></i>;

        const InfoBox = ({ data }) => (
            <div className="text-left space-y-1 text-[11px] mt-2 pt-2 border-t border-current/10">

                {data.info && <div className="bg-black/5 p-1.5 rounded text-[10px] italic mt-1 opacity-80 whitespace-pre-line leading-relaxed">{data.info}</div>}
            </div>
        );

        const MemberItem = ({ data, level = 0, forceOpen, searchTerm }) => {
            const [isOpen, setIsOpen] = useState(level < 1);
            const hasChildren = data.children && data.children.length > 0;
            const isMatch = searchTerm && data.name.toLowerCase().includes(searchTerm.toLowerCase());
            useEffect(() => { if (forceOpen !== null) setIsOpen(forceOpen); }, [forceOpen]);

            return (
                <div className="w-full relative">
                    <div className={`member-card-ml p-4 flex flex-col ${isMatch ? 'ring-2 ring-amber-500 bg-amber-50' : ''} ${data.color ? 'border-l-4 border-amber-800' : ''}`} onClick={() => hasChildren && setIsOpen(!isOpen)}>
                        <div className="flex justify-between items-start">
                            <div className="flex-1">
                                {data.title && <span className="bg-amber-600 text-white text-[9px] font-black px-2 py-0.5 rounded uppercase mb-1 inline-block">{data.title}</span>}
                                <h3 className={`font-bold ${data.deceased ? 'text-slate-700' : 'text-red-900'} ${level === 0 ? 'text-lg' : 'text-md'}`}>{data.name}</h3>
                                <InfoBox data={data} />
                            </div>
                            {hasChildren && <Icon name={isOpen ? "chevron-up" : "chevron-down"} size={18} className="text-slate-300 ml-2"/>}
                        </div>
                    </div>
                    {hasChildren && isOpen && (
                        <div className="node-container-ml">
                            {data.children.map((child, i) => <MemberItem key={i} data={child} level={level + 1} forceOpen={forceOpen} searchTerm={searchTerm} />)}
                        </div>
                    )}
                </div>

        };

        const TreeNode = ({ data, level = 0, searchTerm }) => {
            const [isOpen, setIsOpen] = useState(level < 2);
            const hasChildren = data.children && data.children.length > 0;
            const isMatch = searchTerm && data.name.toLowerCase().includes(searchTerm.toLowerCase());
            return (
                <div className="tree-item">
                    <div className={`node-card relative p-5 flex flex-col border w-64 ${level === 0 ? 'bg-red-950 text-amber-100 border-amber-600' : 'bg-white text-slate-800 border-slate-200'} ${isMatch ? 'highlight' : ''}`} onClick={() => hasChildren && setIsOpen(!isOpen)}>
                        {data.title && <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-amber-500 text-white text-[9px] font-black px-3 py-1 rounded-full uppercase z-50">{data.title}</div>}
                        <h3 className={`font-serif font-bold text-center ${level === 0 ? 'text-xl' : 'text-[15px]'}`}>{data.name}</h3>
                        <InfoBox data={data} />
                        {hasChildren && <div className="mt-2 flex justify-center opacity-30"><Icon name={isOpen ? "chevron-up" : "chevron-down"} size={14} /></div>}
                        {hasChildren && isOpen && <div className="parent-line" />}
                    </div>
                    {hasChildren && isOpen && (
                        <div className="tree-branch">
                            {data.children.map((child, i) => <TreeNode key={i} data={child} level={level + 1} searchTerm={searchTerm} />)}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [viewMode, setViewMode] = useState('list');
            const [searchTerm, setSearchTerm] = useState("");
            const [scale, setScale] = useState(0.4);
            const [pos, setPos] = useState({ x: 0, y: 100 });
            const [allOpen, setAllOpen] = useState(null);
            const [reminders, setReminders] = useState([]);
            const [showModal, setShowModal] = useState(false);

            const isDragging = useRef(false);
            const startPos = useRef({ x: 0, y: 0 });
            const todayLunar = useMemo(() => LunarDate.getTodayLunar(), []);

            useEffect(() => {
                const list = [];
                scanNotesForDeaths(GIA_PHA_DATA, todayLunar, list);
                if (list.length > 0) {
                    // Lọc trùng lặp
                    const unique = list.reduce((acc, current) => {
                        const x = acc.find(item => item.name === current.name && item.date === current.date);
                        if (!x) return acc.concat([current]);
                        else return acc;
                    }, []);
                    setReminders(unique.sort((a,b) => a.days - b.days));
                    setShowModal(true);
                }
            }, [todayLunar]);

            return (
                <div className="h-screen w-full flex flex-col overflow-hidden bg-[#fdfaf5]">
                    {/* MODAL CẢNH BÁO GIỖ CHI TIẾT */}
                    {showModal && (
                        <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-900/80 backdrop-blur-sm">
                            <div className="bg-white rounded-[32px] w-full max-w-sm overflow-hidden animate-pop shadow-2xl border-t-8 border-rose-800">
                                <div className="p-8 text-center bg-rose-50">
                                    <div className="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto mb-4 shadow-sm">
                                        <Icon name="bell-ring" size={32} className="text-rose-600" />
                                    </div>
                                    <h2 className="font-serif text-2xl font-black text-slate-800 uppercase">Thông Báo Ngày Giỗ</h2>
                                    <p className="text-[10px] text-slate-400 font-bold uppercase mt-1">Quét thành viên & Người thân trong ghi chú</p>
                                </div>
                                <div className="p-6 space-y-3 max-h-[45vh] overflow-y-auto">
                                    {reminders.map((item, idx) => (
                                        <div key={idx} className="p-4 bg-slate-50 rounded-2xl border border-slate-100 flex justify-between items-center">
                                            <div className="min-w-0">
                                                <p className="font-bold text-slate-800 text-sm truncate">{item.name}</p>
                                                <p className="text-[10px] text-rose-600 font-bold">Ngày: {item.date}</p>
                                                <p className="text-[8px] text-slate-400 italic mt-1 uppercase">{item.relation}</p>
                                            </div>
                                            <div className={`px-2 py-1.5 rounded-lg text-[9px] font-black uppercase shrink-0 ml-2 ${item.days === 0 ? 'bg-red-600 text-white animate-pulse' : 'bg-amber-100 text-amber-900'}`}>
                                                {item.days === 0 ? "Hôm nay" : `Còn ${item.days} ngày`}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="p-6">
                                    <button onClick={() => setShowModal(false)} className="w-full py-4 bg-slate-900 text-white rounded-2xl font-black text-[11px] uppercase tracking-widest active:scale-95 shadow-lg">Ghi nhớ cội nguồn</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <header className="h-24 header-glass text-white flex items-center justify-between px-6 shrink-0 sticky top-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-600 p-2 rounded-xl shadow-inner"><Icon name="scroll" size={20}/></div>
                            <div>
                                <h1 className="font-serif text-lg font-black text-amber-200 uppercase leading-none">PHẠM TỘC GIA PHẢ</h1>
                                <p className="text-white/40 text-[8px] font-bold uppercase mt-1">Âm lịch: {todayLunar.label}</p>
                            </div>
                        </div>
                        <div className="flex bg-white/10 p-1 rounded-xl border border-white/10">
                            <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${viewMode === 'list' ? 'bg-amber-600 text-white shadow-lg' : 'text-white/40'}`}>Danh sách</button>
                            <button onClick={() => setViewMode('tree')} className={`px-4 py-2 rounded-lg text-[9px] font-black uppercase transition-all ${viewMode === 'tree' ? 'bg-amber-600 text-white shadow-lg' : 'text-white/40'}`}>Sơ đồ</button>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {viewMode === 'list' ? (
                            <div className="list-viewport p-6 max-w-2xl mx-auto pb-32">
                                <div className="sticky top-0 z-50 mb-6 bg-[#fdfaf5]/90 backdrop-blur-md p-2 rounded-2xl border border-slate-200 shadow-sm flex gap-2">
                                    <div className="relative flex-1">
                                        <Icon name="search" size={16} className="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"/>
                                        <input type="text" placeholder="Tìm tên thành viên..." className="w-full pl-11 pr-4 py-3 bg-white rounded-xl outline-none text-sm" onChange={e => setSearchTerm(e.target.value)} />
                                    </div>
                                    <button onClick={() => setAllOpen(!allOpen)} className="px-4 py-2 bg-slate-900 text-white font-black rounded-xl text-[9px] uppercase">{allOpen ? "Thu gọn" : "Mở hết"}</button>
                                </div>
                                <MemberItem data={GIA_PHA_DATA} forceOpen={allOpen} searchTerm={searchTerm} />
                            </div>
                        ) : (
                            <div
                                className="h-full w-full grab-container"
                                onWheel={(e) => setScale(s => Math.min(2, Math.max(0.1, s + (e.deltaY > 0 ? -0.05 : 0.05))))}
                                onMouseDown={e => { isDragging.current = true; startPos.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}
                                onMouseMove={e => isDragging.current && setPos({ x: e.clientX - startPos.current.x, y: e.clientY - startPos.current.y })}
                                onMouseUp={() => isDragging.current = false}
                                onTouchStart={e => { isDragging.current = true; startPos.current = { x: e.touches[0].clientX - pos.x, y: e.touches[0].clientY - pos.y }; }}
                                onTouchMove={e => isDragging.current && setPos({ x: e.touches[0].clientX - startPos.current.x, y: e.touches[0].clientY - startPos.current.y })}
                                onTouchEnd={() => isDragging.current = false}
                            >
                                <div style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transformOrigin: 'top center' }} className="absolute inset-0 flex justify-center pt-10 transition-transform duration-75">
                                    <TreeNode data={GIA_PHA_DATA} searchTerm={searchTerm} />
                                </div>
                                <div className="absolute bottom-6 right-6 flex flex-col gap-2">
                                    <button onClick={() => setScale(s => s + 0.1)} className="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center text-slate-800"><Icon name="plus" /></button>
                                    <button onClick={() => setScale(s => s - 0.1)} className="w-12 h-12 bg-white rounded-2xl shadow-xl flex items-center justify-center text-slate-800"><Icon name="minus" /></button>
                                    <button onClick={() => {setPos({x:0, y:100}); setScale(0.4);}} className="w-12 h-12 bg-amber-600 rounded-2xl shadow-xl flex items-center justify-center text-white"><Icon name="refresh-cw" size={18}/></button>
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
