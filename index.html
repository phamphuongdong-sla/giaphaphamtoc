
<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"/>
<title>Phạm Tộc · Gia Phả</title>
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://unpkg.com/lucide@latest"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,800;0,900;1,700&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS ──────────────────────────────────── */
:root{
  --bg0:#080c14;
  --bg1:#0d1220;
  --bg2:#121829;
  --bg3:#1a2235;
  --bg4:#212c42;
  --line:#ffffff0d;
  --line2:#ffffff14;
  --line3:#ffffff1f;

  --gold:#c8923e;
  --gold2:#e0b060;
  --gold3:#f5d080;
  --gold-glow:rgba(200,146,62,.18);

  --red:#c04040;
  --red2:#e05050;
  --green:#3a8c5a;

  --t0:#f0f4ff;
  --t1:#b8c4d8;
  --t2:#6e7e9a;
  --t3:#3d4d65;

  --r4:4px;--r8:8px;--r10:10px;--r12:12px;--r16:16px;--r20:20px;--r24:24px;

  --ease-out:cubic-bezier(.2,.8,.2,1);
  --ease-spring:cubic-bezier(.34,1.4,.64,1);
}

*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body,#root{width:100%;height:100%}

body{
  font-family:'Inter',system-ui,sans-serif;
  background:var(--bg0);
  color:var(--t0);
  overflow:hidden;
  -webkit-font-smoothing:antialiased;
  text-rendering:optimizeLegibility;
}

/* subtle animated mesh bg */
body::before{
  content:"";position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 60% 40% at 20% 10%, rgba(200,146,62,.06) 0%,transparent 60%),
    radial-gradient(ellipse 50% 35% at 80% 90%, rgba(80,100,180,.05) 0%,transparent 60%);
}

/* ─── SHELL ──────────────────────────────────── */
.shell{position:relative;z-index:1;height:100vh;display:flex;flex-direction:column;overflow:hidden}

/* ─── TOPBAR ─────────────────────────────────── */
.topbar{
  flex-shrink:0;
  display:flex;align-items:center;justify-content:space-between;gap:12px;
  padding:0 clamp(14px,3vw,36px);
  height:64px;
  background:rgba(13,18,32,.92);
  border-bottom:1px solid var(--line2);
  backdrop-filter:blur(24px) saturate(1.8);
  -webkit-backdrop-filter:blur(24px) saturate(1.8);
  position:relative;z-index:100;
}
.topbar::after{
  content:"";position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold)40%,var(--gold2)50%,var(--gold)60%,transparent);
  opacity:.35;
}

.tb-brand{display:flex;align-items:center;gap:12px;min-width:0}

/* Sigil */
.sigil{
  flex-shrink:0;width:40px;height:40px;border-radius:50%;
  background:linear-gradient(135deg,var(--bg3),var(--bg4));
  border:1px solid var(--gold-glow);
  display:grid;place-items:center;
  box-shadow:0 0 20px var(--gold-glow),inset 0 1px 0 rgba(255,255,255,.06);
  position:relative;
}
.sigil-icon{color:var(--gold2)}

.tb-title{
  font-family:'Playfair Display',serif;
  font-size:clamp(16px,2vw,22px);font-weight:800;
  color:var(--t0);letter-spacing:.01em;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.tb-sub{font-size:10px;font-weight:500;color:var(--t2);margin-top:1px;letter-spacing:.04em}

/* Pill tabs */
.tab-group{
  display:flex;gap:2px;padding:3px;
  background:rgba(255,255,255,.04);
  border:1px solid var(--line2);
  border-radius:var(--r10);
}
.tab-btn{
  display:flex;align-items:center;gap:6px;
  height:32px;padding:0 14px;border-radius:var(--r8);
  font-size:10.5px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  color:var(--t2);transition:all .18s var(--ease-out);
}
.tab-btn:hover{color:var(--t1)}
.tab-btn.on{
  background:linear-gradient(135deg,var(--gold),var(--gold2));
  color:var(--bg0);
  box-shadow:0 4px 16px rgba(200,146,62,.3);
}

/* ─── TICKER ─────────────────────────────────── */
.ticker{
  flex-shrink:0;display:flex;align-items:center;
  height:36px;
  background:rgba(200,146,62,.07);
  border-bottom:1px solid rgba(200,146,62,.12);
  overflow:hidden;position:relative;
}
.ticker::before,.ticker::after{
  content:"";position:absolute;top:0;bottom:0;width:60px;z-index:2;pointer-events:none;
}
.ticker::before{left:0;background:linear-gradient(90deg,var(--bg1),transparent)}
.ticker::after{right:0;background:linear-gradient(270deg,var(--bg1),transparent)}
.ticker-label{
  flex-shrink:0;z-index:3;
  display:flex;align-items:center;gap:7px;
  padding:0 14px;height:100%;
  border-right:1px solid rgba(200,146,62,.14);
  font-size:9px;font-weight:800;letter-spacing:.16em;text-transform:uppercase;color:var(--gold2);
  white-space:nowrap;
}
.live-dot{
  width:5px;height:5px;border-radius:50%;
  background:var(--gold2);
  box-shadow:0 0 6px var(--gold2);
  animation:blink 2s ease-in-out infinite;
}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.ticker marquee{font-size:11px;font-weight:500;color:var(--t1);letter-spacing:.01em}

/* ─── MAIN ───────────────────────────────────── */
main{flex:1;min-height:0;position:relative;overflow:hidden}

/* ─── LIST SCROLL ────────────────────────────── */
.list-scroll{
  position:absolute;inset:0;
  overflow-y:auto;overflow-x:hidden;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:thin;scrollbar-color:var(--line3) transparent;
}
.list-scroll::-webkit-scrollbar{width:4px}
.list-scroll::-webkit-scrollbar-thumb{background:var(--line3);border-radius:4px}

.list-wrap{width:min(820px,100%);margin:0 auto;padding:0 clamp(12px,2.5vw,24px) 80px}

/* Sticky list header */
.list-hd{
  position:sticky;top:0;z-index:40;
  padding:16px 0 12px;
  background:linear-gradient(180deg,var(--bg0) 65%,transparent);
}
.list-hd-row{display:flex;justify-content:space-between;align-items:center;gap:12px}
.list-eyebrow{font-size:9px;font-weight:700;letter-spacing:.2em;text-transform:uppercase;color:var(--gold);opacity:.7;margin-bottom:4px}
.list-heading{
  font-family:'Playfair Display',serif;
  font-size:clamp(18px,2.2vw,26px);font-weight:800;color:var(--t0);letter-spacing:.01em;
}

/* Expand btn */
.btn-exp{
  display:flex;align-items:center;gap:6px;
  height:34px;padding:0 14px;
  border-radius:var(--r8);
  background:rgba(255,255,255,.05);
  border:1px solid var(--line3);
  color:var(--t1);
  font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;
  transition:all .16s;white-space:nowrap;
}
.btn-exp:hover{background:rgba(255,255,255,.08);border-color:var(--line3);color:var(--t0)}

/* Divider */
.hdiv{height:1px;background:var(--line);margin:12px 0 14px}

/* ─── SEARCH ─────────────────────────────────── */
.s-wrap{
  position:relative;
  margin-bottom:12px;
  border-radius:var(--r12);
  background:rgba(255,255,255,.04);
  border:1px solid var(--line2);
  transition:border-color .16s,box-shadow .16s;
  overflow:hidden;
}
.s-wrap:focus-within{
  border-color:rgba(200,146,62,.35);
  box-shadow:0 0 0 3px rgba(200,146,62,.08);
}
.s-row{display:flex;align-items:center;gap:10px;padding:0 14px}
.s-ico{color:var(--t3);flex-shrink:0}
.s-input{
  flex:1;height:46px;background:transparent;border:none;outline:none;
  font-size:13.5px;font-weight:500;color:var(--t0);font-family:inherit;
}
.s-input::placeholder{color:var(--t3)}
.s-clear{
  width:28px;height:28px;display:grid;place-items:center;
  border-radius:var(--r8);color:var(--t2);
  transition:background .14s;
}
.s-clear:hover{background:rgba(255,255,255,.08)}
.s-meta{
  padding:8px 14px 10px;
  font-size:10px;font-weight:600;color:var(--t3);letter-spacing:.04em;
  border-top:1px solid var(--line);
}
.s-results{}
.s-item{
  display:flex;justify-content:space-between;align-items:center;
  gap:10px;padding:11px 14px;
  border-top:1px solid var(--line);
  cursor:pointer;text-align:left;transition:background .14s;
}
.s-item:hover{background:rgba(255,255,255,.03)}
.s-item-name{font-size:12.5px;font-weight:700;color:var(--t0);line-height:1.3}
.s-item-path{display:block;margin-top:2px;font-size:9.5px;font-weight:500;color:var(--t3)}
.s-empty{padding:16px 14px;font-size:12px;color:var(--t3);text-align:center;font-style:italic;border-top:1px solid var(--line)}

/* ─── MEMBER CARD ────────────────────────────── */
.mc{
  position:relative;
  margin-bottom:5px;
  border-radius:var(--r12);
  background:rgba(255,255,255,.03);
  border:1px solid var(--line2);
  overflow:hidden;
  cursor:pointer;
  transition:background .18s,border-color .18s,transform .18s var(--ease-out);
  animation:fadeup .22s var(--ease-out) both;
}
@keyframes fadeup{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.mc::before{
  content:"";position:absolute;left:0;top:16px;bottom:16px;width:2px;
  background:var(--gold);border-radius:2px;opacity:0;
  transition:opacity .18s;
}
.mc:hover{background:rgba(255,255,255,.05);border-color:var(--line3);transform:translateX(2px)}
.mc:hover::before{opacity:.7}
.mc:active{transform:scale(.995) translateX(1px)}

/* Root */
.mc.root{
  background:linear-gradient(135deg,rgba(200,146,62,.1),rgba(200,146,62,.04));
  border-color:rgba(200,146,62,.22);
  box-shadow:0 8px 32px rgba(200,146,62,.06);
}
.mc.root::before{opacity:.9;background:linear-gradient(180deg,var(--gold3),var(--gold))}
.mc.root:hover{background:linear-gradient(135deg,rgba(200,146,62,.13),rgba(200,146,62,.06));transform:none}

/* Branch */
.mc.branch{
  background:rgba(255,255,255,.025);
  border-color:rgba(200,146,62,.16);
}
.mc.branch::before{background:var(--gold2);opacity:.6}

/* Birthday */
.mc.bday{border-color:rgba(200,146,62,.35);box-shadow:0 0 16px rgba(200,146,62,.08)}

/* Deceased overlay */
.mc-dead-mark{
  position:absolute;top:0;left:0;width:40px;height:40px;overflow:hidden;pointer-events:none;z-index:3;
}
.mc-dead-mark::after{
  content:"";position:absolute;top:7px;left:-18px;
  width:54px;height:12px;
  background:rgba(0,0,0,.55);
  transform:rotate(-45deg);
}

/* Birthday badge */
.bday-tag{
  position:absolute;top:0;right:0;z-index:4;
  display:flex;align-items:center;gap:4px;
  height:18px;padding:0 9px;
  border-bottom-left-radius:10px;
  background:linear-gradient(120deg,var(--gold),var(--gold2));
  color:var(--bg0);
  font-size:7px;font-weight:900;letter-spacing:.1em;text-transform:uppercase;
  pointer-events:none;
}

/* Card body */
.mc-body{
  display:grid;grid-template-columns:minmax(0,1fr) auto;
  gap:10px;align-items:start;
  padding:14px 14px 12px 18px;
}

/* Role pill */
.role-pill{
  display:inline-flex;align-items:center;
  height:16px;padding:0 7px;margin-bottom:5px;
  border-radius:999px;
  background:rgba(200,146,62,.12);
  border:1px solid rgba(200,146,62,.2);
  color:var(--gold2);
  font-size:7.5px;font-weight:800;text-transform:uppercase;letter-spacing:.09em;
}
.root .role-pill{background:rgba(200,146,62,.18);border-color:rgba(200,146,62,.3)}

/* Name */
.mc-name{
  font-family:'Playfair Display',serif;
  font-size:clamp(15px,1.7vw,19px);font-weight:700;
  color:var(--t0);letter-spacing:.01em;line-height:1.2;
}
.root .mc-name{color:var(--gold3)}
.branch .mc-name{color:var(--gold2)}

/* Meta chips */
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:3px 8px;border-radius:var(--r8);
  background:rgba(255,255,255,.04);
  border:1px solid var(--line2);
  color:var(--t2);font-size:10px;font-weight:600;line-height:1.4;
}
.chip b{color:var(--t1);font-weight:700}
.chip.dead{color:rgba(192,64,64,.8);border-color:rgba(192,64,64,.18)}
.chip.dead b{color:var(--red2)}
.root .chip{background:rgba(200,146,62,.07);border-color:rgba(200,146,62,.14)}
.root .chip b{color:var(--gold3)}
.root .chip.dead b{color:var(--gold2)}

/* Note */
.mc-note{
  margin-top:6px;padding:5px 9px;
  border-radius:var(--r8);
  border-left:2px solid rgba(200,146,62,.2);
  background:rgba(200,146,62,.04);
  font-size:10px;font-style:italic;color:var(--t2);line-height:1.5;
}
.root .mc-note{border-left-color:rgba(200,146,62,.3);background:rgba(200,146,62,.07)}

/* Toggle */
.mc-toggle{
  flex-shrink:0;width:34px;height:34px;
  display:grid;place-items:center;
  border-radius:var(--r8);
  background:rgba(255,255,255,.04);
  border:1px solid var(--line2);
  color:var(--t2);
  transition:all .16s;
}
.mc-toggle:hover{background:rgba(255,255,255,.08);color:var(--t0)}
.root .mc-toggle{background:rgba(200,146,62,.1);border-color:rgba(200,146,62,.2);color:var(--gold2)}

/* Indent */
.indent{
  margin:0 0 4px 14px;
  padding-left:14px;
  border-left:1px solid var(--line2);
}
.indent .indent .indent{margin-left:8px;padding-left:9px;border-left-style:dashed}

/* ─── TREE STAGE ─────────────────────────────── */
.tree-stage{
  position:absolute;inset:0;
  cursor:grab;touch-action:none;overflow:hidden;
  background:var(--bg0);
}
.tree-stage::before{
  content:"";position:absolute;inset:0;pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);
  background-size:48px 48px;
}
.tree-stage:active{cursor:grabbing}
.tree-canvas{
  position:absolute;inset:0;
  display:flex;justify-content:center;
  padding-top:36px;
  transform-origin:top center;
  transition:transform .07s linear;
}

/* Tree structure */
.t-branch{position:relative;display:flex;padding-top:40px}
.t-item{
  position:relative;
  display:flex;flex-direction:column;align-items:center;
  padding:40px 12px 0;
}
/* vertical connector */
.t-item::before{
  content:"";position:absolute;top:0;left:50%;
  width:1px;height:40px;transform:translateX(-50%);
  background:linear-gradient(180deg,rgba(200,146,62,.4),rgba(200,146,62,.15));
}
/* horizontal connector */
.t-item::after{
  content:"";position:absolute;top:0;left:0;width:100%;height:1px;
  background:linear-gradient(90deg,transparent,rgba(200,146,62,.3),transparent);
}
.t-item:only-child::after{display:none}
.t-item:first-child::after,.t-item:last-child::after{display:none}
.t-item:first-child::before{
  left:50%;width:calc(50% + .5px);transform:none;
  background:transparent;
  border-top:1px solid rgba(200,146,62,.3);
  border-left:1px solid rgba(200,146,62,.3);
  border-top-left-radius:12px;height:40px;
}
.t-item:last-child::before{
  left:0;width:calc(50% + .5px);transform:none;
  background:transparent;
  border-top:1px solid rgba(200,146,62,.3);
  border-right:1px solid rgba(200,146,62,.3);
  border-top-right-radius:12px;height:40px;
}
.t-item:only-child::before{
  left:50%;width:1px;transform:translateX(-50%);
  border:none;
  background:linear-gradient(180deg,rgba(200,146,62,.4),rgba(200,146,62,.15));
}
.t-root{padding-top:0}
.t-root::before,.t-root::after{display:none!important}

/* Tree card */
.tc{
  position:relative;
  width:260px;min-height:170px;
  border-radius:var(--r16);
  background:rgba(255,255,255,.035);
  border:1px solid var(--line2);
  box-shadow:0 8px 32px rgba(0,0,0,.3);
  cursor:pointer;overflow:visible;
  transition:box-shadow .2s,border-color .2s,transform .2s var(--ease-out);
}
.tc::before{
  content:"";position:absolute;inset:0 0 auto;height:1.5px;
  border-radius:var(--r16) var(--r16) 0 0;
  background:linear-gradient(90deg,transparent,rgba(200,146,62,.5)50%,transparent);
  z-index:2;pointer-events:none;
}
.tc:hover{border-color:rgba(200,146,62,.3);box-shadow:0 16px 48px rgba(0,0,0,.4),0 0 20px rgba(200,146,62,.08);transform:translateY(-2px)}
.tc.root{
  background:linear-gradient(145deg,rgba(200,146,62,.12),rgba(200,146,62,.05));
  border-color:rgba(200,146,62,.28);
  box-shadow:0 12px 40px rgba(200,146,62,.1);
}
.tc.root::before{background:linear-gradient(90deg,transparent,rgba(200,146,62,.8)50%,transparent)}
.tc.branch{
  background:rgba(200,146,62,.06);
  border-color:rgba(200,146,62,.18);
}
.tc.spouse{background:rgba(255,255,255,.025)}
.tc-body{
  position:relative;z-index:1;
  height:100%;padding:14px 14px 12px;
  border-radius:var(--r16);overflow:hidden;
}
.tc .mc-name{text-align:center;font-size:14.5px}
/* down connector */
.t-down{
  position:absolute;left:50%;bottom:-40px;
  width:1px;height:40px;transform:translateX(-50%);
  background:linear-gradient(180deg,rgba(200,146,62,.4),rgba(200,146,62,.1));
  z-index:0;
}
.t-down::after{
  content:"";position:absolute;bottom:0;left:50%;
  width:6px;height:6px;border-radius:50%;transform:translate(-50%,50%);
  background:var(--gold);box-shadow:0 0 8px rgba(200,146,62,.5);
}

/* Tree controls */
.tree-ctrls{
  position:absolute;right:14px;bottom:14px;z-index:30;
  display:flex;flex-direction:column;gap:6px;
}
.tfab{
  width:40px;height:40px;
  display:grid;place-items:center;
  border-radius:var(--r10);
  background:rgba(13,18,32,.88);
  border:1px solid var(--line3);
  color:var(--t1);
  box-shadow:0 4px 16px rgba(0,0,0,.3);
  backdrop-filter:blur(12px);
  transition:all .16s;
}
.tfab:hover{background:rgba(26,34,53,.95);color:var(--t0)}
.tfab.gold{background:linear-gradient(135deg,var(--gold),var(--gold2));border-color:rgba(200,146,62,.4);color:var(--bg0);box-shadow:0 4px 16px rgba(200,146,62,.25)}
.tfab.gold:hover{box-shadow:0 6px 20px rgba(200,146,62,.35)}

/* ─── OVERLAY ─────────────────────────────────── */
.overlay{
  position:fixed;inset:0;z-index:9000;
  display:flex;align-items:center;justify-content:center;
  padding:16px;
  background:rgba(4,6,12,.75);
  backdrop-filter:blur(20px) saturate(1.6);
  -webkit-backdrop-filter:blur(20px) saturate(1.6);
  animation:ov-in .2s ease both;
}
@keyframes ov-in{from{opacity:0}to{opacity:1}}

.panel{
  display:flex;flex-direction:column;
  overflow:hidden;
  border-radius:var(--r24);
  background:var(--bg2);
  border:1px solid var(--line3);
  box-shadow:0 40px 100px rgba(0,0,0,.6),0 0 0 1px rgba(255,255,255,.03);
  animation:pan-in .26s var(--ease-spring) both;
  max-height:min(700px,92vh);
}
@keyframes pan-in{from{opacity:0;transform:translateY(20px) scale(.97)}to{opacity:1;transform:none}}
.panel.sm{width:min(420px,100%)}
.panel.lg{width:min(580px,100%)}

/* Panel header */
.pan-hd{
  flex-shrink:0;position:relative;
  background:linear-gradient(145deg,var(--bg3),var(--bg4));
  border-bottom:1px solid var(--line3);
  overflow:hidden;
}
/* gold top stripe */
.pan-hd::before{
  content:"";position:absolute;top:0;left:0;right:0;height:1.5px;
  background:linear-gradient(90deg,transparent,var(--gold)30%,var(--gold3)50%,var(--gold)70%,transparent);
  opacity:.6;
}
/* subtle diagonal texture */
.pan-hd::after{
  content:"";position:absolute;inset:0;pointer-events:none;

.pan-hd-inner{position:relative;z-index:1}

/* ─── REMINDER MODAL ─────────────────────────── */
.rem-hd{padding:28px 24px 22px;text-align:center}
.rem-ico{
  width:48px;height:48px;margin:0 auto 12px;
  border-radius:50%;
  background:rgba(200,146,62,.1);
  border:1px solid rgba(200,146,62,.2);
  display:grid;place-items:center;color:var(--gold2);
}
.rem-title{font-family:'Playfair Display',serif;font-size:20px;font-weight:800;color:var(--t0);letter-spacing:.01em}
.rem-sub{margin-top:4px;font-size:10px;font-weight:500;color:var(--t3);letter-spacing:.05em}

.pan-list{flex:1;overflow-y:auto;padding:12px;display:grid;gap:7px;scrollbar-width:thin;scrollbar-color:var(--line3) transparent}
.rem-row{
  display:grid;grid-template-columns:minmax(0,1fr) auto;
  gap:10px;align-items:center;
  padding:12px 13px;
  border-radius:var(--r12);
  background:rgba(255,255,255,.03);
  border:1px solid var(--line2);
  transition:border-color .15s;
}
.rem-row:hover{border-color:var(--line3)}
.rem-name{font-size:12px;font-weight:700;color:var(--t0);line-height:1.3}
.rem-date{margin-top:2px;font-size:9.5px;font-weight:600;color:var(--gold)}
.days-badge{
  padding:4px 10px;border-radius:999px;
  background:rgba(200,146,62,.1);border:1px solid rgba(200,146,62,.18);
  color:var(--gold2);font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap;
}
.days-badge.now{background:var(--gold);border-color:var(--gold);color:var(--bg0)}

.pan-ft{flex-shrink:0;padding:10px 12px 14px}
.btn-dismiss{
  width:100%;height:40px;
  display:flex;align-items:center;justify-content:center;gap:8px;
  border-radius:var(--r10);
  background:linear-gradient(135deg,rgba(200,146,62,.15),rgba(200,146,62,.08));
  border:1px solid rgba(200,146,62,.2);
  color:var(--gold2);
  font-size:11px;font-weight:800;letter-spacing:.08em;text-transform:uppercase;
  transition:all .16s;
}
.btn-dismiss:hover{background:linear-gradient(135deg,rgba(200,146,62,.22),rgba(200,146,62,.12));box-shadow:0 4px 16px rgba(200,146,62,.12)}

/* ─── DETAIL MODAL ───────────────────────────── */
.det-hd{padding:22px 58px 18px 22px}
.det-name{font-family:'Playfair Display',serif;font-size:clamp(20px,2.5vw,28px);font-weight:800;color:var(--t0);letter-spacing:.01em;line-height:1.1}
.det-rel{margin-top:5px;font-size:11px;font-weight:500;color:var(--t2);letter-spacing:.03em}
.det-tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:10px}
.det-tag{
  height:20px;padding:0 9px;border-radius:999px;
  background:rgba(200,146,62,.1);border:1px solid rgba(200,146,62,.18);
  color:var(--gold2);font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.07em;
}
.det-close{
  position:absolute;top:14px;right:14px;
  width:32px;height:32px;display:grid;place-items:center;
  border-radius:var(--r8);
  color:var(--t2);background:rgba(255,255,255,.06);border:1px solid var(--line2);
  transition:all .14s;
}
.det-close:hover{background:rgba(255,255,255,.1);color:var(--t0)}

.det-body{flex:1;overflow-y:auto;padding:12px;display:grid;gap:8px;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}

.det-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:6px}
.det-field{
  padding:11px 12px;
  border-radius:var(--r10);
  background:rgba(255,255,255,.025);
  border:1px solid var(--line2);
  transition:border-color .14s;
}
.det-field:hover{border-color:var(--line3)}
.det-label{
  font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(200,146,62,.55);margin-bottom:5px;
  display:flex;align-items:center;gap:5px;
}
.det-val{font-size:12.5px;font-weight:700;color:var(--t1);line-height:1.45}

.info-block{

  background:rgba(255,255,255,.02);border:1px solid var(--line2);

.info-label{
  font-size:8.5px;font-weight:800;text-transform:uppercase;letter-spacing:.1em;
  color:rgba(200,146,62,.55);margin-bottom:8px;
  display:flex;align-items:center;gap:5px;

.lin-path{display:flex;flex-wrap:wrap;align-items:center;gap:3px;font-size:12px;font-weight:700;color:var(--t1);line-height:1.7}
.lin-arrow{color:rgba(200,146,62,.4);margin:0 2px;font-size:11px}
.lin-heart{color:#e05070;margin:0 3px}
.bio{font-size:13.5px;line-height:1.8;color:var(--t1);white-space:pre-wrap;max-height:180px;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--line2) transparent}
.child-list{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.child-item{

  background:rgba(200,146,62,.07);border:1px solid rgba(200,146,62,.12);
  color:var(--t1);font-size:11px;font-weight:600;
  transition:background .14s;

.child-item:hover{background:rgba(200,146,62,.12)}

/* ─── RESPONSIVE ─────────────────────────────── */
@media(max-width:640px){

        const matchedCanChi = source.match(/\b(Tân Mão|Mậu Tý|Kỷ Dậu|Nhâm Thân|Quý Dậu|Bính Thân|Kỷ hợi|Giáp tý|Đinh Mão|Nhâm Dần|Kỷ Mão|Ất tỵ|Kỷ Dậu|Đinh Tỵ|Quý Mùi|Tân Mão|Mậu tý|Nhâm Thìn|Canh Thìn|Nhâm Ngọ|Bính Tuất|Canh Tuất|Bính Thìn|Đinh Mão|Canh Thân|Ất Dậu|Nhâm Tuất|Quý Hợi|Quý Mão|Giáp Thân|Mậu Tý|Quý Tỵ|Kỷ Sửu|Ất Tỵ|Kỷ Mùi|Tân Mão|Giáp tý|Bính Thân|Kỷ Tỵ|Nhâm Thìn|Kỷ Hợi|Canh tý|Quý Hợi|Bính Dần|Canh Ngọ|Đinh Dậu|Canh Tý|Giáp Thìn|Bính Dần|Tân Mùi|Đinh Mão|Nhâm Tuất|Canh tý|Kỷ Hợi|Bính Dần|Kỷ Mão|Nhâm Ngọ|Tân Hợi|Quý Sửu|Ất Hợi|Canh Thìn|Ất Mùi|Đinh Sửu|Giáp Thìn|Giáp Dần|Bính Thìn|Đinh Hợi|Kỷ Sửu|Tân tỵ|Đinh Hợi|Ất Dậu|Kỷ Dậu|Quý Sửu|Ất mão|Mậu Dần|Ất Mão|Quý Mùi|Quý Tỵ|Mậu Ngọ|Quý Hợi|Canh Dần|Canh Thân|Mậu THìn|Tân Mão|Bính Thân)\b/i);
        if (birthLunar) birthLunar.canChi = matchedCanChi[0];
        else birthLunar = { y: yearOnly, canChi: matchedCanChi[0], source: "text-extracted" };
      }

      const parentNote = cleanDateNote(parentText);
      const leadingNoteClean = cleanDateNote(leadingText);
      if (parentNote && !/^(Âm|AL)$/i.test(parentNote)) noteParts.push(parentNote);
      if (leadingNoteClean) noteParts.push(leadingNoteClean);
      return {
        birthSolar,
        birthLunar,
        birthNote: [...new Set(noteParts)].join(" · "),
        dateWarnings: []
      };
    };
    const splitDeathDate = (raw = "") => {
      const source = String(raw || "").trim();
      if (!source) return { deathSolar: null, deathLunar: null, deathNote: "", dateWarnings: [] };
      const parsed = parseDateToken(source);
      const note = cleanDateNote(source);

      let deathLunar = null;
      let deathSolar = null;

      if (parsed) {
        deathLunar = { d: parsed.d, m: parsed.m, y: parsed.y || null, source: "recorded-anniversary" };
      }

      if (/\b(Quý Tỵ|Đinh Dậu|Kỷ Sửu|Giáp Ngọ|Mậu Dần|Bính Dần|Quý Hợi|Kỷ Mão|Ất Dậu|Đinh Tỵ|Quý Mão|Nhâm Dần|Ất Tỵ|Mậu Tý|Nhâm Tuất|Mậu Ngọ|Ất Mùi|Tân tỵ)\b/i.test(source)) {
        const matchedCanChi = source.match(/\b(Quý Tỵ|Đinh Dậu|Kỷ Sửu|Giáp Ngọ|Mậu Dần|Bính Dần|Quý Hợi|Kỷ Mão|Ất Dậu|Đinh Tỵ|Quý Mão|Nhâm Dần|Ất Tỵ|Mậu Tý|Nhâm Tuất|Mậu Ngọ|Ất Mùi|Tân tỵ)\b/i);
        if (deathLunar) deathLunar.canChi = matchedCanChi[0];
        else deathLunar = { y: parsed?.y || null, canChi: matchedCanChi[0], source: "text-extracted-death" };
      }

      if (!parsed) {
        return { deathSolar: null, deathLunar: null, deathNote: isUnspecifiedDateText(source) ? "Đã mất, chưa rõ ngày giỗ" : source, dateWarnings: [] };
      }
      return {
        deathSolar,
        deathLunar,
        deathNote: note,
        dateWarnings: []
      };
    };
    const GENDER_OVERRIDES = {
      "PHẠM HƯƠNG CHỬ": "male",
      "PHẠM TRÚC LAM": "female",
      "PHẠM MINH QUÂN": "male",
      "PHẠM MINH DƯƠNG": "male",
      "PHẠM HOÀNG DƯƠNG": "male",
      "PHẠM NAM ANH": "male",
      "PHẠM NGỌC ANH": "female",
      "PHẠM TRÂN TUÂN": "male",
      "PHẠM MINH ANH": "female"
    };

    const deriveGender = (name = "") => {
      const displayName = cleanName(name).toUpperCase();
      if (GENDER_OVERRIDES[displayName]) return GENDER_OVERRIDES[displayName];
      if (isSpouse(name) || displayName.includes(" THỊ ") || displayName.startsWith("THỊ ") || displayName.includes("BÀ ")) return "female";
      if (displayName.includes("CON TRAI") || displayName.includes(" VĂN ") || displayName.includes(" ĐỨC ")) return "male";
      const femaleHints = ["HUYỀN", "THẢO", "VÂN", "LAN", "HƯƠNG", "LINH", "XUÂN", "CÚC", "LOÁN", "TÚ", "TÂN", "TƯ", "ĐÀO", "ÁNH", "HUỆ", "YẾN", "NỤ", "NGA", "SEN", "THÙY", "THÁI", "NHẠN", "NHIÊN", "DIỆU", "KIM", "QUỲNH", "TRANG", "THƯ", "TUYỀN", "TIÊN", "RỤNG"];
      const maleHints = ["COỎNG", "CHƯ", "CHI", "CẨN", "TIẾN", "CHÁNH", "TUỆ", "KHANH", "TUYÊN", "DƯƠNG", "ĐỨC", "ĐÔ", "NAM", "THANH", "TUẤN", "CƯỜNG", "SƠN", "THẠCH", "SINH", "NGỌC", "TRỌNG", "THẮNG", "KHÁNH", "MẠNH", "CÔNG"];
      if (femaleHints.some((hint) => displayName.includes(hint))) return "female";
      if (maleHints.some((hint) => displayName.includes(hint))) return "male";
      return "unknown";
    };
    const getGenderLabel = (gender) => gender === "male" ? "Nam" : gender === "female" ? "Nữ" : "Chưa rõ";

    const getNormalizedRole = (node) => {
      const roleName = getNameRole(node.name);
      if (node.isCurrentHead) return "Trưởng họ";
      if (node.title === "Trưởng họ" && node.deceased) return "Trưởng họ";
      if (node.title) return node.title;
      if (roleName) return roleName;
      return "";
    };
    const normalizeGenealogy = (node, inheritedBranch = "") => {
      const ownBranch = node.branch || "";
      const branchLine = ownBranch || inheritedBranch;
      const birthParts = splitBirthDate(node.birth, node.name);
      const deathParts = splitDeathDate(node.death);
      const clean = cleanName(node.name);
      const isCurrentHead = clean === "PHẠM NGỌC CHI" && !node.deceased;
      const normalized = {
        ...node,
        ...birthParts,
        ...deathParts,
        branch: branchLine,
        branchRoot: ownBranch,
        dateWarnings: [],
        gender: node.gender || deriveGender(node.name),
        role: node.role || getNormalizedRole({ ...node, isCurrentHead }),
        branchLine,
        isCurrentHead,
        isSpouse: isSpouse(node.name)
      };
      normalized.children = node.children?.map((child) => normalizeGenealogy(child, branchLine));
      return normalized;
    };

    const getGenTitle = (person, gen) => {
      const name = typeof person === "string" ? person : person.name;
      const gender = typeof person === "string" ? deriveGender(person) : (person.gender || deriveGender(person.name));
      const femaleKeywords = ["THỊ", "BÀ ", "XUYẾN", "NỤ", "NGA", "SEN", "THÙY", "THÁI", "CÚC", "VÂN", "HUYỀN", "THẢO", "NHẠN", "NHIÊN", "XUÂN", "LAM", "LOÁN", "TÚ", "TÂN", "TƯ", "ĐÀO", "ÁNH", "HUỆ", "YẾN", "RỤNG", "NHUNG", "HÀ", "LINH", "TRANG", "THƯ", "TUYỀN", "TIÊN", "PHIẾM", "UYÊN", "VÍCH", "VIÊM", "DINH", "HƯỜNG", "NŨ", "NGÂN"];
      const isFemale = cleanName(name) !== "PHẠM HƯƠNG CHỬ" && (gender === "female" || isSpouse(name) || femaleKeywords.some((k) => name.toUpperCase().includes(k)));
      if (gen === 1) return isFemale ? "Cụ tổ bà" : "Cụ tổ ông";
      if (gen === 2) return isFemale ? "Cụ bà" : "Cụ ông";
      if (gen === 3) return isFemale ? "Bà" : "Ông";
      return "";
    };
    const describeNode = (node, parentNode, grandparentNode, gen) => {
      const titlePrefix = getGenTitle(node, gen);
      const displayName = cleanName(node.name);
      let relation = "";
      if (isSpouse(node.name) && parentNode) {
        const husbandTitle = getGenTitle(parentNode, gen) || "ông";
        relation = `Vợ ${husbandTitle.toLowerCase()} ${cleanName(parentNode.name)}`;
      } else if (parentNode) {
        const father = isSpouse(parentNode.name) ? grandparentNode : parentNode;
        if (father && cleanName(father.name) !== "PHẠM HƯƠNG CHỬ") {
          const fatherTitle = getGenTitle(father, gen - 1) || "bố";
          relation = `Con ${fatherTitle.toLowerCase()} ${cleanName(father.name)}`;
        }
      }
      return `${titlePrefix ? `${titlePrefix} ` : ""}${displayName}${relation ? ` (${relation})` : ""}`;
    };
    const visitTree = (node, parentNode, grandparentNode, gen, visitor) => {
      const currentGen = parentNode === null ? 1 : (isSpouse(node.name) ? gen : gen + 1);
      visitor(node, parentNode, grandparentNode, currentGen);
      node.children?.forEach((child) => visitTree(child, node, parentNode, currentGen, visitor));
    };
    const normalizeText = (value = "") =>
      String(value)
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/đ/g, "d")
        .replace(/Đ/g, "D")
        .toLowerCase();
    const buildMemberEntries = (treeData) => {
      const entries = [];
      const walk = (node, parentNode, grandparentNode, gen, branchName, pathNodes) => {
        const currentGen = parentNode === null ? 1 : (isSpouse(node.name) ? gen : gen + 1);
        const currentBranch = node.branchLine || node.branch || branchName || "";

        const currentPath = [...pathNodes, node];
        const fullName = describeNode(node, parentNode, grandparentNode, currentGen);
        const pathNames = currentPath.map(n => cleanName(n.name));

        const searchText = normalizeText([
          node.name,
          cleanName(node.name),
          node.title,
          node.role,
          node.branch,
          node.branchRoot,
          node.branchLine,
          formatBirth(node),
          formatDeath(node),
          node.info,
          node.bio,
          getGenderLabel(node.gender),
          currentBranch,
          pathNames.join(" "),
          fullName
        ].filter(Boolean).join(" "));
        entries.push({
          id: pathNames.join(" > "),
          data: node,
          parentNode,
          grandparentNode,
          gen: currentGen,
          branchName: currentBranch,
          pathNodes: currentPath,
          pathNames: pathNames,
          fullName,
          searchText
        });
        node.children?.forEach((child) => walk(child, node, parentNode, currentGen, currentBranch, currentPath));
      };
      walk(treeData, null, null, 1, "", []);
      return entries;
    };
    const getBirthdays = (treeData) => {
      const list = [];
      visitTree(treeData, null, null, 1, (node, parentNode, grandparentNode, gen) => {
        const date = node.birthSolar;
        if (!node.deceased && date?.d && date?.m && date.m === CURRENT_SOLAR_MONTH && date.d >= CURRENT_SOLAR_DAY) {
          list.push({ fullName: describeNode(node, parentNode, grandparentNode, gen), birthSolar: date, day: date.d });
        }
      });
      return list.sort((a, b) => a.day - b.day);
    };
    const getReminders = (treeData, todayLunar) => {
      const list = [];
      const current = new Date();
      const todayJdn = VietnameseLunarCalendar.jdFromDate(current.getDate(), current.getMonth() + 1, current.getFullYear());
      visitTree(treeData, null, null, 1, (node, parentNode, grandparentNode, gen) => {
        const death = node.deathLunar;
        if (!death?.d || !death?.m) return;
        let targetSolar = VietnameseLunarCalendar.lunarToSolar(death.d, death.m, todayLunar.y, death.leap || false, VN_TIMEZONE);
        if (!targetSolar) return;
        let targetJdn = VietnameseLunarCalendar.jdFromDate(targetSolar.d, targetSolar.m, targetSolar.y);
        if (targetJdn < todayJdn) {
          targetSolar = VietnameseLunarCalendar.lunarToSolar(death.d, death.m, todayLunar.y + 1, death.leap || false, VN_TIMEZONE);
          if (!targetSolar) return;
          targetJdn = VietnameseLunarCalendar.jdFromDate(targetSolar.d, targetSolar.m, targetSolar.y);
        }
        const days = targetJdn - todayJdn;
        if (days >= 0 && days <= 20) {
          list.push({ fullName: describeNode(node, parentNode, grandparentNode, gen), date: formatLunarDate(death), days });
        }
      });
      return list.sort((a, b) => a.days - b.days);
    };
    /* ── Icon ───────────────────────────────── */
    const Icon = ({ name, size = 16 }) => {
      useEffect(() => { window.lucide?.createIcons(); }, [name]);
      return <i data-lucide={name} style={{ width: size, height: size, display: "inline-block", verticalAlign: "middle", flexShrink: 0 }} />;
    };

    /* ── Meta chips ─────────────────────────── */
    const Chips = ({ data, isRoot }) => (
      <>
        <div className="chips">
          {(data.birthSolar || data.birthLunar || data.birthNote) && (
            <span className="chip">
              <Icon name="sun" size={11} />
              Sinh&nbsp;<b>{formatBirth(data)}</b>
            </span>
          )}
          {data.deceased && (data.deathLunar || data.deathSolar || data.deathNote) && (
            <span className="chip dead">
              <Icon name="moon" size={11} />
              Mất&nbsp;<b>{formatDeath(data)}</b>
            </span>
          )}
        </div>
        {data.info && <p className="mc-note">{data.info}</p>}
      </>
    );

    /* ── Detail Modal ───────────────────────── */
    const DetailModal = ({ person, onClose }) => {
      if (!person) return null;
      const { data, parentNode, grandparentNode, gen, branchName, pathNodes } = person;
      const displayName = cleanName(data.name);
      const roleName    = getNameRole(data.name);
      const genTitle    = getGenTitle(data, gen);
      const thoDuong    = getThoDuongLabel(data.birthSolar, data.birthLunar, data.deathSolar, data.deathLunar);
      const status      = data.deceased ? (thoDuong ? `Đã mất · ${thoDuong}` : "Đã mất") : "Còn sống";
      const actualParent = parentNode && isSpouse(parentNode.name) ? grandparentNode : parentNode;
      const relation    = parentNode
        ? (isSpouse(data.name) ? `${roleName || "Vợ"} của ${cleanName(parentNode.name)}`
                                : `Con của ${actualParent ? cleanName(actualParent.name) : cleanName(parentNode.name)}`)
        : "Thủy tổ của gia phả";
      const tags = [...new Set([data.role, roleName, genTitle, data.branchRoot].filter(Boolean))];
      const branchLabel = data.branchLine || branchName || "Gốc gia phả";

      return (
        <div className="overlay" onClick={onClose}>
          <section className="panel lg" onClick={e => e.stopPropagation()}>

            <div className="pan-hd">
              <div className="pan-hd-inner det-hd" style={{ position: "relative" }}>
                <button className="det-close" onClick={onClose}><Icon name="x" size={15} /></button>
                <h2 className="det-name">{displayName}</h2>
                <p className="det-rel">{relation}</p>
                {tags.length > 0 && (
                  <div className="det-tags">{tags.map(t => <span className="det-tag" key={t}>{t}</span>)}</div>
                )}
              </div>
            </div>

            <div className="det-body">
              <div className="det-grid">
                <div className="det-field">
                  <p className="det-label"><Icon name="user" size={10} /> Họ tên</p>
                  <p className="det-val">{displayName}</p>
                </div>
                <div className="det-field">
                  <p className="det-label"><Icon name="layers" size={10} /> Đời thứ</p>
                  <p className="det-val">{gen}{[genTitle, roleName, data.role].filter(Boolean).length ? " · " + [...new Set([genTitle, roleName, data.role].filter(Boolean))].join(" · ") : ""}</p>
                </div>
                <div className="det-field">
                  <p className="det-label"><Icon name="sun" size={10} /> Ngày sinh</p>
                  <p className="det-val">{formatBirth(data) || "—"}</p>
                </div>
                {data.deceased && (
                  <div className="det-field">
                    <p className="det-label"><Icon name="moon" size={10} /> Ngày mất</p>
                    <p className="det-val">{formatDeath(data) || "—"}</p>
                  </div>
                )}
                <div className="det-field">
                  <p className="det-label"><Icon name="activity" size={10} /> Trạng thái</p>
                  <p className="det-val" style={{ color: data.deceased ? "var(--red2)" : "var(--green)", fontWeight: 800 }}>{status}</p>
                </div>
                <div className="det-field">
                  <p className="det-label"><Icon name="user-round" size={10} /> Giới tính</p>
                  <p className="det-val">{getGenderLabel(data.gender)}</p>
                </div>
                <div className="det-field" style={{ gridColumn: "span 2" }}>
                  <p className="det-label"><Icon name="git-branch" size={10} /> Chi nhánh</p>
                  <p className="det-val">{branchLabel}</p>
                </div>
              </div>

              <div className="info-block">
                <p className="info-label"><Icon name="route" size={10} /> Thế thứ</p>
                <p className="lin-path">
                  {pathNodes.map((n, i) => {
                    const nm = cleanName(n.name);
                    if (i === 0) return <span key={i}>{nm}</span>;
                    if (n.isSpouse) return <React.Fragment key={i}><span className="lin-heart">♥</span><span>{nm}</span></React.Fragment>;
                    return <React.Fragment key={i}><span className="lin-arrow">›</span><span>{nm}</span></React.Fragment>;
                  })}
                </p>
              </div>

              {data.bio && (
                <div className="info-block">
                  <p className="info-label"><Icon name="book-open" size={10} /> Tiểu sử</p>
                  <div className="bio">{data.bio}</div>
                </div>
              )}

              {data.info && !data.bio && (
                <div className="info-block">
                  <p className="info-label"><Icon name="file-text" size={10} /> Ghi chú</p>
                  <p className="lin-path">{data.info}</p>
                </div>
              )}

              <div className="info-block">
                <p className="info-label"><Icon name="users" size={10} /> Vợ chồng · Con cái</p>
                {(data.children || []).length > 0 ? (
                  <div className="child-list">
                    {(data.children || []).map((c, i) => <span className="child-item" key={i}>{formatPersonName(c)}</span>)}
                  </div>
                ) : (
                  <p style={{ fontSize: 11, color: "var(--t3)", fontStyle: "italic", marginTop: 4 }}>Chưa có dữ liệu.</p>
                )}
              </div>
            </div>

            <div className="pan-ft">
              <button className="btn-dismiss" onClick={onClose}><Icon name="x" size={13} /> Đóng</button>
            </div>
          </section>
        </div>
      );
    };

    /* ── Search ─────────────────────────────── */
    const Search = ({ query, onChange, results, total, onSelect }) => (
      <div className="s-wrap">
        <div className="s-row">
          <span className="s-ico"><Icon name="search" size={16} /></span>
          <input
            className="s-input"
            value={query}
            onChange={e => onChange(e.target.value)}
            placeholder="Tìm tên, ngày sinh, ngày giỗ, chi nhánh…"
          />
          {query && <button className="s-clear" onClick={() => onChange("")}><Icon name="x" size={14} /></button>}
        </div>
        {query.trim() && (
          <>
            <p className="s-meta">Tìm thấy {results.length} / {total}</p>
            {results.length > 0
              ? <div className="s-results">
                  {results.slice(0, 12).map(item => (
                    <button className="s-item" key={item.id} onClick={() => onSelect(item)}>
                      <span>
                        <span className="s-item-name">{item.data.name}</span>
                        <span className="s-item-path">{item.pathNames.join(" › ")}</span>
                      </span>
                      <Icon name="chevron-right" size={14} />
                    </button>
                  ))}
                </div>
              : <p className="s-empty">Không tìm thấy kết quả phù hợp.</p>
            }
          </>
        )}
      </div>
    );

    /* ── Member List Item ───────────────────── */
    const Item = ({ data, level = 0, forceOpen, onSelect, parentNode = null, grandparentNode = null, gen = 1, branchName = "", pathNodes = [] }) => {
      const [open, setOpen] = useState(level < 1);
      const has       = data.children?.length > 0;
      const bd        = data.birthSolar;
      const isBday    = !data.deceased && bd?.d && bd?.m && bd.m === CURRENT_SOLAR_MONTH && bd.d >= CURRENT_SOLAR_DAY;
      const isRoot    = level === 0;
      const isBranch  = !!data.branchRoot && level > 0;
      const curGen    = parentNode === null ? 1 : (isSpouse(data.name) ? gen : gen + 1);
      const curBranch = data.branchLine || data.branch || branchName || "";
      const curPath   = [...pathNodes, data];
      const person    = { data, parentNode, grandparentNode, gen: curGen, branchName: curBranch, pathNodes: curPath, fullName: describeNode(data, parentNode, grandparentNode, curGen) };

      useEffect(() => { if (forceOpen !== null) setOpen(forceOpen); }, [forceOpen]);

      const cls = ["mc", isRoot ? "root" : "", isBranch ? "branch" : "", isBday ? "bday" : ""].filter(Boolean).join(" ");

      return (
        <div>
          <article className={cls} onClick={() => onSelect(person)}>
            {data.deceased && <div className="mc-dead-mark" />}
            {isBday && <div className="bday-tag"><Icon name="cake" size={8} /> Sinh nhật</div>}
            <div className="mc-body">
              <div style={{ paddingLeft: data.deceased ? 30 : 0 }}>
                {(data.role || data.branchRoot) && <div className="role-pill">{data.role || data.branchRoot}</div>}
                <h3 className="mc-name">{data.name}</h3>
                <Chips data={data} isRoot={isRoot} />
              </div>
              {has && (
                <button className="mc-toggle" onClick={e => { e.stopPropagation(); setOpen(o => !o); }} aria-label="toggle">
                  <Icon name={open ? "chevron-up" : "chevron-down"} size={15} />
                </button>
              )}
            </div>
          </article>
          {has && open && (
            <div className="indent">
              {data.children.map((c, i) => (
                <Item key={`${c.name}-${i}`} data={c} level={level + 1} forceOpen={forceOpen} onSelect={onSelect}
                  parentNode={data} grandparentNode={parentNode} gen={curGen} branchName={curBranch} pathNodes={curPath} />
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ── Tree Node ──────────────────────────── */
    const TreeNode = ({ data, level = 0, onSelect, parentNode = null, grandparentNode = null, gen = 1, branchName = "", pathNodes = [] }) => {
      const [open, setOpen] = useState(level < 1);
      const has       = data.children?.length > 0;
      const bd        = data.birthSolar;
      const isBday    = !data.deceased && bd?.d && bd?.m && bd.m === CURRENT_SOLAR_MONTH && bd.d >= CURRENT_SOLAR_DAY;
      const isRoot    = level === 0;
      const isBranch  = !!data.branchRoot && level > 0;
      const curGen    = parentNode === null ? 1 : (isSpouse(data.name) ? gen : gen + 1);
      const curBranch = data.branchLine || data.branch || branchName || "";
      const curPath   = [...pathNodes, data];
      const person    = { data, parentNode, grandparentNode, gen: curGen, branchName: curBranch, pathNodes: curPath, fullName: describeNode(data, parentNode, grandparentNode, curGen) };

      const cardCls = ["tc", isRoot ? "root" : "", isBranch ? "branch" : "", isSpouse(data.name) ? "spouse" : "", isBday ? "bday" : ""].filter(Boolean).join(" ");

      return (
        <div className={`t-item ${level === 0 ? "t-root" : ""}`}>
          <article className={cardCls} onClick={() => onSelect(person)}>
            {data.deceased && <div className="mc-dead-mark" />}
            {isBday && <div className="bday-tag"><Icon name="cake" size={8} /> Sinh nhật</div>}
            <div className="tc-body">
              {(data.role || data.branchRoot) && (
                <div style={{ display: "flex", justifyContent: "center", marginBottom: 6 }}>
                  <span className="role-pill">{data.role || data.branchRoot}</span>
                </div>
              )}
              <h3 className="mc-name">{data.name}</h3>
              <Chips data={data} isRoot={isRoot} />
              {has && (
                <button
                  style={{ display: "flex", margin: "8px auto 0", width: 28, height: 28, alignItems: "center", justifyContent: "center", borderRadius: 8, opacity: .45, color: "var(--t1)" }}
                  onClick={e => { e.stopPropagation(); setOpen(o => !o); }}
                >
                  <Icon name={open ? "chevron-up" : "chevron-down"} size={13} />
                </button>
              )}
            </div>
            {has && open && <div className="t-down" />}
          </article>
          {has && open && (
            <div className="t-branch">
              {data.children.map((c, i) => (
                <TreeNode key={`${c.name}-${i}`} data={c} level={level + 1} onSelect={onSelect}
                  parentNode={data} grandparentNode={parentNode} gen={curGen} branchName={curBranch} pathNodes={curPath} />
              ))}
            </div>
          )}
        </div>
      );
    };

    /* ── App ────────────────────────────────── */
    const App = () => {
      const [view, setView]         = useState("list");
      const [scale, setScale]       = useState(.48);
      const [pos, setPos]           = useState({ x: 0, y: 72 });
      const [allOpen, setAllOpen]   = useState(null);
      const [showRem, setShowRem]   = useState(false);
      const [query, setQuery]       = useState("");
      const [selected, setSelected] = useState(null);
      const drag = useRef(false);
      const ds   = useRef({ x: 0, y: 0 });

      const family  = useMemo(() => normalizeGenealogy(GIA_PHA_DATA), []);
      const lunar   = useMemo(() => VietnameseLunarCalendar.getLunarToday(), []);
      const bdays   = useMemo(() => getBirthdays(family), [family]);
      const rems    = useMemo(() => getReminders(family, lunar), [family, lunar]);
      const entries = useMemo(() => buildMemberEntries(family), [family]);

      const results = useMemo(() => {
        const terms = normalizeText(query).split(/\s+/).filter(Boolean);
        if (!terms.length) return [];
        return entries.filter(e => terms.every(t => e.searchText.includes(t)));
      }, [entries, query]);

      useEffect(() => {
        if (rems.length) setShowRem(true);
        if (window.ToanAppGiaPha) window.ToanAppGiaPha.postMessage(rems.length.toString());
      }, [rems.length]);

      const onDown  = (x, y) => { drag.current = true; ds.current = { x: x - pos.x, y: y - pos.y }; };
      const onMove  = (x, y) => { if (drag.current) setPos({ x: x - ds.current.x, y: y - ds.current.y }); };
      const onUp    = () => { drag.current = false; };

      return (
        <div className="shell">
          <DetailModal person={selected} onClose={() => setSelected(null)} />

          {/* Reminder */}
          {showRem && (
            <div className="overlay">
              <section className="panel sm">
                <div className="pan-hd">
                  <div className="pan-hd-inner rem-hd">
                    <div className="rem-ico"><Icon name="bell-ring" size={22} /></div>
                    <h2 className="rem-title">Ngày giỗ sắp tới</h2>
                    <p className="rem-sub">{lunar.label} · Tháng {CURRENT_SOLAR_MONTH}</p>
                  </div>
                </div>
                <div className="pan-list">
                  {rems.map((r, i) => (
                    <div className="rem-row" key={i}>
                      <div>
                        <p className="rem-name">{r.fullName}</p>
                        <p className="rem-date">{r.date}</p>
                      </div>
                      <span className={`days-badge ${r.days === 0 ? "now" : ""}`}>
                        {r.days === 0 ? "Hôm nay" : `${r.days} ngày`}
                      </span>
                    </div>
                  ))}
                </div>
                <div className="pan-ft">
                  <button className="btn-dismiss" onClick={() => setShowRem(false)}>
                    <Icon name="check" size={13} /> Đã rõ
                  </button>
                </div>
              </section>
            </div>
          )}

          {/* Topbar */}
          <header className="topbar">
            <div className="tb-brand">
              <div className="sigil">
                <span className="sigil-icon"><Icon name="scroll-text" size={20} /></span>
              </div>
              <div>
                <p className="tb-sub">Lưu trữ thế hệ · Gia tộc Phạm</p>
                <h1 className="tb-title">Gia Phả Phạm Tộc</h1>
              </div>
            </div>
            <nav className="tab-group">
              <button className={`tab-btn ${view === "list" ? "on" : ""}`} onClick={() => setView("list")}>
                <Icon name="list" size={12} /> Danh sách
              </button>
              <button className={`tab-btn ${view === "tree" ? "on" : ""}`} onClick={() => setView("tree")}>
                <Icon name="network" size={12} /> Sơ đồ cây
              </button>
            </nav>
          </header>

          {/* Ticker */}
          {bdays.length > 0 && (
            <div className="ticker">
              <div className="ticker-label">
                <div className="live-dot" />
                <Icon name="cake" size={11} />
                Sinh nhật
              </div>
              <marquee scrollamount="4">
                {bdays.map(m => `✦ ${m.fullName}  (${shortSolarDate(m.birthSolar)})`).join("     ")}
              </marquee>
            </div>
          )}

          {/* Main */}
          <main>
            {view === "list" ? (
              <div className="list-scroll">
                <div className="list-wrap">
                  <div className="list-hd">
                    <div className="list-hd-row">
                      <div>
                        <p className="list-eyebrow">✦ Dòng họ Phạm</p>
                        <h2 className="list-heading">Thành viên gia tộc</h2>
                      </div>
                      <button className="btn-exp" onClick={() => setAllOpen(v => !v)}>
                        <Icon name={allOpen ? "minimize-2" : "maximize-2"} size={12} />
                        {allOpen ? "Thu gọn" : "Mở hết"}
                      </button>
                    </div>
                    <div className="hdiv" />
                  </div>

                  <Search query={query} onChange={setQuery} results={results} total={entries.length} onSelect={setSelected} />

                  <Item data={family} forceOpen={allOpen} onSelect={setSelected} />
                </div>
              </div>
            ) : (
              <div
                className="tree-stage"
                onWheel={e => setScale(s => Math.min(1.8, Math.max(.16, s + (e.deltaY > 0 ? -.04 : .04))))}
                onMouseDown={e => onDown(e.clientX, e.clientY)}
                onMouseMove={e => onMove(e.clientX, e.clientY)}
                onMouseUp={onUp} onMouseLeave={onUp}
                onTouchStart={e => onDown(e.touches[0].clientX, e.touches[0].clientY)}
                onTouchMove={e => onMove(e.touches[0].clientX, e.touches[0].clientY)}
                onTouchEnd={onUp}
              >
                <div className="tree-canvas" style={{ transform: `translate(${pos.x}px,${pos.y}px) scale(${scale})` }}>
                  <TreeNode data={family} onSelect={setSelected} />
                </div>
                <div className="tree-ctrls">
                  <button className="tfab" onClick={() => setScale(s => Math.min(1.8, s + .07))}><Icon name="plus" size={17} /></button>
                  <button className="tfab" onClick={() => setScale(s => Math.max(.16, s - .07))}><Icon name="minus" size={17} /></button>
                  <button className="tfab gold" onClick={() => { setPos({ x: 0, y: 72 }); setScale(.48); }}><Icon name="home" size={16} /></button>
                </div>
              </div>
            )}
          </main>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
