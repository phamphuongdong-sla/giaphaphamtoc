            return (
                <div className="h-screen w-full flex flex-col bg-[#fdfaf5]">
                    <header className="h-20 header-glass text-white flex items-center justify-between px-6 z-50 shrink-0">
                        <div className="flex items-center gap-3">
                            <div className="bg-amber-600 p-2 rounded-xl hidden sm:block"><Icon name="library" size={20}/></div>
                            <div>
                                <h1 className="font-serif text-lg font-black text-amber-200">PHẠM TỘC GIA PHẢ</h1>
                                <p className="text-white/40 text-[8px] font-bold uppercase tracking-widest mt-0.5">Phúc Đức Tại Mẫu</p>
                            </div>
                        </div>
                        <div className="flex bg-white/10 p-1 rounded-xl border border-white/10">
                            <button onClick={() => setViewMode('list')} className={`px-4 py-2 rounded-lg flex items-center gap-2 transition-all ${viewMode === 'list' ? 'bg-amber-600 text-white' : 'text-white/40'}`}>
                                <Icon name="list-tree" size={16}/> <span className="text-[10px] font-bold">DANH SÁCH</span>
                            </button>
                            <button onClick={() => setViewMode('tree')} className={`px-4 py-2 rounded-lg flex items-center gap-2 transition-all ${viewMode === 'tree' ? 'bg-amber-600 text-white' : 'text-white/40'}`}>
                                <Icon name="network" size={16}/> <span className="text-[10px] font-bold">SƠ ĐỒ</span>
                            </button>
                        </div>
                    </header>

                    <main className="flex-1 relative overflow-hidden">
                        {viewMode === 'tree' ? (
                            <div className="h-full w-full grab-container" onMouseDown={e => onStart(e.clientX, e.clientY)} onMouseMove={e => onMove(e.clientX, e.clientY)} onMouseUp={onEnd} onMouseLeave={onEnd} onTouchStart={e => onStart(e.touches[0].clientX, e.touches[0].clientY)} onTouchMove={e => onMove(e.touches[0].clientX, e.touches[0].clientY)} onTouchEnd={onEnd}>
                                <div className="absolute bottom-6 right-6 z-40 flex flex-col gap-2">
                                    <button onClick={() => setScale(s => Math.min(1.5, s+0.1))} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-slate-800"><Icon name="zoom-in" /></button>
                                    <button onClick={() => {setPos({x:0, y:50}); setScale(0.4);}} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-[10px] font-bold text-slate-800">RESET</button>
                                    <button onClick={() => setScale(s => Math.max(0.1, s-0.1))} className="w-12 h-12 bg-white rounded-full shadow-lg flex items-center justify-center text-slate-800"><Icon name="zoom-out" /></button>
                                </div>
                                <div style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transformOrigin: 'top center' }} className="absolute inset-0 flex justify-center pt-10">
                                    <TreeNode data={GIA_PHA_DATA} searchTerm={searchTerm} />
                                </div>
                            </div>
                        ) : (
                            <div className="list-viewport">
                                <div className="max-w-xl mx-auto px-4 py-6 pb-24">
                                    <div className="bg-white p-3 rounded-2xl shadow-sm border mb-6 flex items-center gap-3 sticky top-4 z-40">
                                        <div className="relative flex-1">
                                            <Icon name="search" size={14} className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"/>
                                            <input type="text" placeholder="Tìm tên thành viên..." className="w-full pl-9 pr-4 py-2.5 bg-slate-100 rounded-lg outline-none text-sm" onChange={(e) => setSearchTerm(e.target.value)}/>
                                        </div>
                                        <button onClick={() => setAllOpen(!allOpen)} className="px-4 py-2.5 bg-amber-100 text-amber-700 font-bold rounded-lg text-[10px] uppercase">
                                            {allOpen ? "Thu gọn" : "Mở hết"}
                                        </button>
                                    </div>
                                    <MemberItem data={GIA_PHA_DATA} forceOpen={allOpen} searchTerm={searchTerm} />
                                </div>
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
