        .tree-branch { display: flex; padding-top: 40px; position: relative; }
        .tree-item { position: relative; padding: 0 20px; display: flex; flex-direction: column; align-items: center; }
        .tree-item::before { content: ''; position: absolute; top: 0; left: 50%; width: 2px; height: 40px; background: #cbd5e1; transform: translateX(-50%); }
        .tree-item::after { content: ''; position: absolute; top: 0; width: 100%; height: 2px; background: #cbd5e1; }
        .tree-item:first-child::after { left: 50%; width: 51%; }
        .tree-item:last-child::after { right: 50%; width: 51%; }
        .tree-item:only-child::after { display: none; }
        .parent-line { position: absolute; bottom: -40px; left: 50%; width: 2px; height: 40px; background: #cbd5e1; transform: translateX(-50%); z-index: 10; }

            return <i data-lucide={name} style={{ width: size, height: size }}></i>;
        };

        const TreeNode = ({ data, level = 0, searchTerm }) => {
            const [isOpen, setIsOpen] = useState(level < 3);
            const hasChildren = data.children && data.children.length > 0;
            const isMatch = searchTerm && data.name.toLowerCase().includes(searchTerm.toLowerCase());

            const getCardStyle = () => {
                if (level === 0) return "bg-rose-900 text-white w-72 ring-4 ring-rose-200";
                if (level === 1) return `${data.color} w-64`;
                if (data.title) return "bg-amber-50 border-2 border-amber-400 text-slate-900 w-60";
                return "bg-white border border-slate-200 text-slate-800 w-60";
            };

            return (
                <div className="tree-item">
                    <div className={`node-card relative p-4 text-center flex flex-col ${getCardStyle()} ${isMatch ? 'highlight' : ''}`}>
                        {data.title && (
                            <div className="absolute -top-3 left-1/2 -translate-x-1/2 bg-amber-400 text-amber-950 text-[9px] font-black px-2 py-0.5 rounded-full uppercase z-30">
                                {data.title}
                            </div>
                        )}
                        <h3 className={`font-serif font-bold leading-tight mb-2 ${level === 0 ? 'text-lg' : 'text-md'}`}>{data.name}</h3>

                        <div className="text-left space-y-1 text-[12px] border-t border-current/10 pt-2">
                            <div className="flex items-center gap-2 opacity-80">
                                <Icon name="baby" size={12}/> <span>S: {data.birth || "00-00-0000"}</span>
                            </div>
                            <div className="flex items-center gap-2 text-red-400 font-medium">

                            </div>
                            <div className="mt-1 italic opacity-70 leading-tight">
                                {data.info || "00-00-0000"}
                            </div>
                        </div>

                        {hasChildren && (
                            <button onClick={() => setIsOpen(!isOpen)} className="absolute -bottom-3 left-1/2 -translate-x-1/2 bg-white border border-slate-200 w-6 h-6 rounded-full flex items-center justify-center shadow-sm z-30 text-slate-500 hover:scale-110 transition-transform">
                                <Icon name={isOpen ? "chevron-up" : "chevron-down"} size={16} />
                            </button>
                        )}
                        {hasChildren && isOpen && <div className="parent-line" />}
                    </div>
                    {hasChildren && isOpen && (
                        <div className="tree-branch">
                            {data.children.map((child, i) => <TreeNode key={i} data={child} level={level + 1} searchTerm={searchTerm} />)}
                        </div>
                    )}
                </div>
            );
        };

        const App = () => {
            const [scale, setScale] = useState(0.6);
            const [pos, setPos] = useState({ x: 0, y: 30 });
            const [drag, setDrag] = useState(false);
            const [searchTerm, setSearchTerm] = useState("");
            const offset = useRef({ x: 0, y: 0 });

            return (
                <div className="h-screen w-full flex flex-col overflow-hidden">
                    {/* Header Gọn Nhẹ */}
                    <header className="h-16 bg-white border-b-2 border-rose-900 flex items-center justify-between px-6 z-50 shadow-sm">
                        <div className="flex items-center gap-3">
                            <div className="bg-rose-900 p-2 rounded-lg text-white"><Icon name="scroll-text" size={20}/></div>
                            <div>
                                <h1 className="font-serif text-lg font-black text-slate-900 leading-none">GIA PHẢ PHẠM TỘC</h1>
                                <p className="text-rose-800 font-bold uppercase tracking-widest text-[8px] mt-0.5">PHẠM HƯƠNG CHỨ 1891</p>
                            </div>
                        </div>
                        <div className="flex items-center gap-4">
                            <div className="relative">
                                <div className="absolute left-3 top-1/2 -translate-y-1/2 text-slate-400"><Icon name="search" size={14}/></div>
                                <input
                                    type="text"
                                    placeholder="Tìm tên..."
                                    className="pl-9 pr-4 py-1.5 bg-slate-100 rounded-lg w-48 text-xs outline-none focus:ring-1 focus:ring-rose-500 transition-all font-medium"
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center bg-slate-100 p-1 rounded-lg border">
                                <button onClick={() => setScale(s => Math.max(0.1, s-0.1))} className="p-1 hover:bg-white rounded transition-all"><Icon name="zoom-out" size={16}/></button>
                                <span className="text-xs font-bold w-10 text-center">{Math.round(scale*100)}%</span>
                                <button onClick={() => setScale(s => Math.min(2, s+0.1))} className="p-1 hover:bg-white rounded transition-all"><Icon name="zoom-in" size={16}/></button>
                            </div>
                        </div>
                    </header>

                    <main
                        className="flex-1 grab-container bg-slate-50 relative"
                        onMouseDown={e => { setDrag(true); offset.current = { x: e.clientX - pos.x, y: e.clientY - pos.y }; }}
                        onMouseMove={e => { if(drag) setPos({ x: e.clientX - offset.current.x, y: e.clientY - offset.current.y }); }}
                        onMouseUp={() => setDrag(false)}
                    >
                        <div
                            style={{ transform: `translate(${pos.x}px, ${pos.y}px) scale(${scale})`, transformOrigin: 'top center' }}
                            className="absolute inset-0 flex justify-center pt-16 transition-transform duration-75"
                        >
                            <TreeNode data={GIA_PHA_DATA} searchTerm={searchTerm} />
                        </div>
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
